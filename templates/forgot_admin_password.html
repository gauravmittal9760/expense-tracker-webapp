<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>
Recover Admin Password
</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet"
>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    min-height:100vh;

    overflow:hidden;

    font-family:
    "Poppins",
    sans-serif;

    background:
    radial-gradient(circle at top left,#02142b,#000814 60%);

    display:flex;
    justify-content:center;
    align-items:center;

    position:relative;

    color:white;
}

/* ===== Animated Background ===== */

.bg-grid{

    position:absolute;

    inset:0;

    background-image:
    linear-gradient(
        rgba(255,255,255,0.03) 1px,
        transparent 1px
    ),
    linear-gradient(
        90deg,
        rgba(255,255,255,0.03) 1px,
        transparent 1px
    );

    background-size:55px 55px;

    animation:gridMove 18s linear infinite;
}

@keyframes gridMove{

    0%{
        transform:translateY(0px);
    }

    100%{
        transform:translateY(55px);
    }
}

/* ===== Floating Orbs ===== */

.orb{

    position:absolute;

    border-radius:50%;

    filter:blur(90px);

    opacity:0.32;

    animation:floatOrb 10s ease-in-out infinite;
}

.orb1{

    width:360px;
    height:360px;

    background:#00e5ff;

    top:-120px;
    left:-120px;
}

.orb2{

    width:300px;
    height:300px;

    background:#7b2ff7;

    right:-90px;
    bottom:-100px;

    animation-delay:2s;
}

.orb3{

    width:220px;
    height:220px;

    background:#00ffae;

    top:40%;
    left:50%;

    animation-delay:4s;
}

@keyframes floatOrb{

    0%{
        transform:translateY(0px) scale(1);
    }

    50%{
        transform:translateY(-35px) scale(1.08);
    }

    100%{
        transform:translateY(0px) scale(1);
    }
}

/* ===== Glass Card ===== */

.card-box{

    width:500px;

    padding:45px;

    position:relative;

    border-radius:35px;

    background:
    rgba(255,255,255,0.07);

    backdrop-filter:blur(22px);

    border:
    1px solid rgba(255,255,255,0.12);

    box-shadow:
    0 0 50px rgba(0,255,255,0.12),
    inset 0 0 20px rgba(255,255,255,0.04);

    overflow:hidden;

    z-index:5;

    animation:cardEntry 1.1s ease;
}

@keyframes cardEntry{

    from{

        opacity:0;

        transform:
        translateY(50px)
        scale(0.92);
    }

    to{

        opacity:1;

        transform:
        translateY(0px)
        scale(1);
    }
}

/* ===== Shine Effect ===== */

.card-box::before{

    content:"";

    position:absolute;

    width:180px;
    height:650px;

    background:
    linear-gradient(
        to bottom,
        transparent,
        rgba(255,255,255,0.18),
        transparent
    );

    top:-180px;
    left:-250px;

    transform:rotate(25deg);

    animation:shine 6s linear infinite;
}

@keyframes shine{

    0%{
        left:-250px;
    }

    100%{
        left:760px;
    }
}

/* ===== Logo ===== */

.logo-wrap{

    width:100px;
    height:100px;

    margin:auto;

    border-radius:50%;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(
        135deg,
        #00d9ff,
        #00ffae
    );

    box-shadow:
    0 0 35px rgba(0,255,255,0.5);

    animation:pulse 2.5s infinite;
}

.logo-wrap i{

    font-size:42px;

    color:#00111f;
}

@keyframes pulse{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.08);
    }

    100%{
        transform:scale(1);
    }
}

/* ===== Title ===== */

.title{

    text-align:center;

    font-size:44px;

    font-weight:900;

    margin-top:28px;

    background:
    linear-gradient(
        90deg,
        #00e5ff,
        #00ffae,
        #ffffff
    );

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;
}

.subtitle{

    text-align:center;

    margin-top:12px;

    line-height:1.8;

    color:#cbd5e1;

    font-size:15px;

    margin-bottom:35px;
}

/* ===== Input ===== */

.input-box{

    position:relative;

    margin-bottom:28px;
}

.input-box input{

    width:100%;

    height:65px;

    border:none;

    outline:none;

    border-radius:18px;

    padding:
    0 20px 0 62px;

    background:
    rgba(255,255,255,0.06);

    border:
    1px solid rgba(255,255,255,0.08);

    color:white;

    font-size:17px;

    transition:0.3s;
}

.input-box input:focus{

    border-color:#00e5ff;

    box-shadow:
    0 0 20px rgba(0,229,255,0.22);

    transform:translateY(-2px);
}

.input-box i{

    position:absolute;

    left:22px;
    top:50%;

    transform:translateY(-50%);

    color:#00e5ff;

    font-size:20px;
}

.input-box input::placeholder{

    color:#b8c7d9;
}

/* ===== Button ===== */

.btn-recover{

    width:100%;

    height:64px;

    border:none;

    border-radius:18px;

    font-size:19px;

    font-weight:800;

    color:#00111f;

    cursor:pointer;

    background:
    linear-gradient(
        135deg,
        #00e5ff,
        #00ffae
    );

    transition:0.35s;

    position:relative;

    overflow:hidden;
}

.btn-recover:hover{

    transform:
    translateY(-4px)
    scale(1.02);

    box-shadow:
    0 0 30px rgba(0,255,200,0.35);
}

.btn-recover::before{

    content:"";

    position:absolute;

    width:120px;
    height:220px;

    background:
    rgba(255,255,255,0.3);

    left:-140px;
    top:-70px;

    transform:rotate(25deg);

    animation:btnShine 4s linear infinite;
}

@keyframes btnShine{

    0%{
        left:-140px;
    }

    100%{
        left:600px;
    }
}

/* ===== Bottom Line ===== */

.bottom-text{

    text-align:center;

    margin-top:25px;

    color:#9fb3c8;

    font-size:14px;
}

/* ===== Floating Icons ===== */

.float-icon{

    position:absolute;

    color:rgba(255,255,255,0.08);

    font-size:28px;

    animation:floatIcons 8s ease-in-out infinite;
}

.icon1{
    top:12%;
    left:14%;
}

.icon2{
    bottom:15%;
    right:18%;

    animation-delay:2s;
}

.icon3{
    top:65%;
    left:8%;

    animation-delay:4s;
}

@keyframes floatIcons{

    0%{
        transform:translateY(0px) rotate(0deg);
    }

    50%{
        transform:translateY(-22px) rotate(12deg);
    }

    100%{
        transform:translateY(0px) rotate(0deg);
    }
}

/* ===== Responsive ===== */

@media(max-width:600px){

    .card-box{

        width:92%;

        padding:35px 24px;
    }

    .title{

        font-size:34px;
    }

    .subtitle{

        font-size:14px;
    }
}

</style>

</head>

<body>

<div class="bg-grid"></div>

<div class="orb orb1"></div>

<div class="orb orb2"></div>

<div class="orb orb3"></div>

<div class="float-icon icon1">
    <i class="fa-solid fa-user-shield"></i>
</div>

<div class="float-icon icon2">
    <i class="fa-solid fa-lock"></i>
</div>

<div class="float-icon icon3">
    <i class="fa-solid fa-fingerprint"></i>
</div>

<form
method="POST"
class="card-box"
>

<div class="logo-wrap">

    <i class="fa-solid fa-shield-halved"></i>

</div>

<div class="title">

    Recover Admin

</div>

<div class="subtitle">

    Verify your administrator identity
    to securely recover panel access
    and regain control of the system.

</div>

<div class="input-box">

    <i class="fa-solid fa-key"></i>

    <input

        type="text"

        name="security_answer"

        placeholder="Enter Admin Security Answer"

        required
    >

</div>

<button class="btn-recover">

    Verify Identity

</button>

<div class="bottom-text">

    Expense Tracker Secure Admin Recovery ⚡

</div>

</form>

</body>
</html>
