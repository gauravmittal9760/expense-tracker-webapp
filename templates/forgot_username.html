<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Forgot Username
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    >

    <style>

        * {

            margin: 0;
            padding: 0;
            box-sizing: border-box;

        }

        body {

            min-height: 100vh;

            background:
                linear-gradient(
                    135deg,
                    #0f172a,
                    #111827,
                    #1e293b
                );

            overflow-x: hidden;

            font-family:
                "Segoe UI",
                sans-serif;

            position: relative;

        }

        /* BACKGROUND GLOW */

        body::before {

            content: "";

            position: absolute;

            width: 450px;
            height: 450px;

            background: rgba(
                59,
                130,
                246,
                0.25
            );

            border-radius: 50%;

            top: -120px;
            left: -120px;

            filter: blur(100px);

        }

        body::after {

            content: "";

            position: absolute;

            width: 400px;
            height: 400px;

            background: rgba(
                168,
                85,
                247,
                0.22
            );

            border-radius: 50%;

            bottom: -120px;
            right: -100px;

            filter: blur(100px);

        }

        .main-wrapper {

            min-height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;

            padding: 30px;

            position: relative;

            z-index: 10;

        }

        .recover-card {

            width: 100%;
            max-width: 560px;

            background: rgba(
                17,
                24,
                39,
                0.88
            );

            border:
                1px solid rgba(
                    255,
                    255,
                    255,
                    0.08
                );

            border-radius: 28px;

            backdrop-filter: blur(18px);

            padding: 45px;

            box-shadow:
                0 0 40px rgba(
                    0,
                    0,
                    0,
                    0.45
                );

            animation:
                fadeIn 0.7s ease;

        }

        @keyframes fadeIn {

            from {

                opacity: 0;
                transform:
                    translateY(25px);

            }

            to {

                opacity: 1;
                transform:
                    translateY(0);

            }

        }

        .top-icon {

            width: 85px;
            height: 85px;

            margin: auto;

            border-radius: 50%;

            display: flex;

            justify-content: center;

            align-items: center;

            background:
                linear-gradient(
                    135deg,
                    #2563eb,
                    #7c3aed
                );

            box-shadow:
                0 0 35px rgba(
                    59,
                    130,
                    246,
                    0.45
                );

            margin-bottom: 22px;

        }

        .top-icon i {

            color: white;

            font-size: 38px;

        }

        .main-heading {

            text-align: center;

            font-size: 34px;

            font-weight: 700;

            color: white;

            margin-bottom: 10px;

        }

        .sub-text {

            text-align: center;

            color: #cbd5e1;

            font-size: 15px;

            margin-bottom: 35px;

        }

        .input-group-custom {

            position: relative;

            margin-bottom: 24px;

        }

        .input-group-custom i {

            position: absolute;

            top: 50%;
            left: 18px;

            transform: translateY(-50%);

            color: #9ca3af;

            font-size: 18px;

        }

        .form-control {

            height: 58px;

            background: rgba(
                255,
                255,
                255,
                0.05
            ) !important;

            border:
                1px solid rgba(
                    255,
                    255,
                    255,
                    0.1
                ) !important;

            color: white !important;

            border-radius: 16px;

            padding-left: 50px;

            font-size: 16px;

            transition: 0.3s;

        }

        .form-control::placeholder {

            color: #bfc7d4;

        }

        .form-control:focus {

            border-color: #3b82f6 !important;

            box-shadow:
                0 0 0 0.20rem rgba(
                    59,
                    130,
                    246,
                    0.25
                ) !important;

        }

        .recover-btn {

            width: 100%;

            height: 56px;

            border: none;

            border-radius: 16px;

            background:
                linear-gradient(
                    135deg,
                    #2563eb,
                    #7c3aed
                );

            color: white;

            font-size: 17px;

            font-weight: 600;

            transition: 0.3s;

            margin-top: 8px;

        }

        .recover-btn:hover {

            transform: translateY(-2px);

            box-shadow:
                0 12px 28px rgba(
                    59,
                    130,
                    246,
                    0.35
                );

        }

        .result-box {

            margin-top: 35px;

            background: rgba(
                255,
                255,
                255,
                0.06
            );

            border:
                1px solid rgba(
                    255,
                    255,
                    255,
                    0.08
                );

            border-radius: 18px;

            padding: 25px;

        }

        .result-title {

            color: #60a5fa;

            font-weight: 700;

            margin-bottom: 20px;

            text-align: center;

        }

        .username-item {

            background:
                linear-gradient(
                    135deg,
                    rgba(37,99,235,0.18),
                    rgba(124,58,237,0.18)
                );

            border:
                1px solid rgba(
                    255,
                    255,
                    255,
                    0.08
                );

            border-radius: 14px;

            padding: 14px 18px;

            margin-bottom: 14px;

            color: white;

            font-size: 17px;

            font-weight: 600;

            display: flex;

            align-items: center;

            gap: 12px;

        }

        .username-item i {

            color: #60a5fa;

            font-size: 18px;

        }

        .bottom-links {

            margin-top: 30px;

            text-align: center;

        }

        .bottom-links a {

            text-decoration: none;

            color: #cbd5e1;

            font-weight: 500;

            transition: 0.3s;

        }

        .bottom-links a:hover {

            color: white;

        }

        @media(max-width: 576px) {

            .recover-card {

                padding: 30px 22px;

            }

            .main-heading {

                font-size: 28px;

            }

        }

        /* FIX AUTOFILL WHITE BACKGROUND ISSUE */
input:-webkit-autofill,
input:-webkit-autofill:hover,
input:-webkit-autofill:focus,
input:-webkit-autofill:active {
    -webkit-box-shadow: 0 0 0px 1000px #111827 inset !important;
    -webkit-text-fill-color: white !important;
    caret-color: white;
    transition: background-color 9999s ease-in-out 0s;
}

    </style>

</head>

<body>

<div class="main-wrapper">

    <div class="recover-card">

        <div class="top-icon">

            <i class="bi bi-person-badge-fill"></i>

        </div>

        <h1 class="main-heading">

            Recover Username

        </h1>

        <p class="sub-text">

            Enter your registered email address to find all linked usernames.

        </p>

        <form method="POST">

            <div class="input-group-custom">

                <i class="bi bi-envelope-fill"></i>

                <input
                    type="email"
                    name="email"
                    class="form-control"
                    placeholder="Enter Registered Email Address"
                    required
                >

            </div>

            <button class="recover-btn">

                <i class="bi bi-search me-2"></i>

                Find Username

            </button>

        </form>

        {% if usernames %}

        <div class="result-box">

            <h4 class="result-title">

                Your Usernames

            </h4>

            {% for username in usernames %}

            <div class="username-item">

                <i class="bi bi-person-circle"></i>

                {{ username }}

            </div>

            {% endfor %}

        </div>

        {% endif %}

        <div class="bottom-links">

            <a href="/">

                <i class="bi bi-arrow-left-circle"></i>

                Back to Login

            </a>

        </div>

    </div>

</div>

</body>

</html>
