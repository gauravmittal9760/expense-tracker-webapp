<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        User Expenses
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    >

    <style>

        body{

            min-height:100vh;

            background:
                radial-gradient(circle at top left,
                #132238,
                #080b12 45%,
                #020305 100%);

            color:white;

            overflow-x:hidden;
        }

        .orb{

            position:fixed;

            width:420px;

            height:420px;

            border-radius:50%;

            filter:blur(100px);

            z-index:-1;
        }

        .orb1{

            background:
                rgba(0,229,255,0.10);

            top:-120px;

            left:-120px;
        }

        .orb2{

            background:
                rgba(0,230,118,0.10);

            bottom:-150px;

            right:-120px;
        }

        .page-wrapper{

            padding:40px 18px;
        }

        .main-title{

            text-align:center;

            margin-bottom:40px;
        }

        .main-title h1{

            font-size:56px;

            font-weight:900;

            background:
                linear-gradient(
                    90deg,
                    #00e5ff,
                    #00e676,
                    #64ffda
                );

            -webkit-background-clip:text;

            -webkit-text-fill-color:transparent;
        }

        .main-title p{

            color:#b8c4df;

            margin-top:10px;

            font-size:18px;
        }

        .glass-card{

            background:
                rgba(255,255,255,0.05);

            border:
                1px solid rgba(255,255,255,0.08);

            border-radius:35px;

            padding:30px;

            backdrop-filter:blur(18px);

            box-shadow:
                0 0 45px rgba(0,0,0,0.45);
        }

        .table{

            margin:0;

            border-collapse:separate;

            border-spacing:0 14px;
        }

        .table thead th{

            border:none;

            color:#00e5ff;

            text-transform:uppercase;

            letter-spacing:1px;

            font-size:14px;
        }

        .table tbody tr{

            background:
                rgba(255,255,255,0.04);

            transition:0.3s;

            border-radius:20px;
        }

        .table tbody tr:hover{

            transform:translateY(-4px);

            background:
                rgba(0,229,255,0.08);

            box-shadow:
                0 0 25px rgba(0,229,255,0.12);
        }

        .table td{

            border:none;

            padding:20px 14px;

            vertical-align:middle;

            color:#f1f1f1;
        }

        .user-chip{

            background:
                rgba(0,229,255,0.12);

            color:#00e5ff;

            padding:10px 18px;

            border-radius:50px;

            font-weight:800;
        }

        .expense-count{

            color:#00e676;

            font-weight:900;

            font-size:20px;
        }

        .view-btn{

            border:none;

            border-radius:14px;

            padding:12px 20px;

            font-weight:800;

            background:
                linear-gradient(
                    135deg,
                    #00e676,
                    #00c853
                );

            color:black;

            transition:0.3s;
        }

        .view-btn:hover{

            transform:scale(1.05);

            box-shadow:
                0 0 22px rgba(0,230,118,0.28);
        }

        .back-btn{

            width:100%;

            margin-top:28px;

            border:none;

            border-radius:18px;

            padding:16px;

            font-size:18px;

            font-weight:800;

            background:
                linear-gradient(
                    135deg,
                    #ff1744,
                    #d50000
                );

            color:white;

            transition:0.3s;
        }

        .back-btn:hover{

            transform:translateY(-3px);

            box-shadow:
                0 0 25px rgba(255,23,68,0.28);
        }

        @media(max-width:768px){

            .main-title h1{

                font-size:40px;
            }

            .table td{

                font-size:14px;
            }

        }

    </style>

</head>

<body>

<div class="orb orb1"></div>

<div class="orb orb2"></div>

<div class="container-fluid page-wrapper">

    <div class="main-title">

        <h1>

            📊 User Expenses Analytics

        </h1>

        <p>

            View all users and monitor their expense activity in real-time.

        </p>

    </div>

    <div class="glass-card">

        <div class="table-responsive">

            <table class="table text-center align-middle">

                <thead>

                    <tr>

                        <th>
                            User ID
                        </th>

                        <th>
                            Username
                        </th>

                        <th>
                            Total Expenses
                        </th>

                        <th>
                            Action
                        </th>

                    </tr>

                </thead>

                <tbody>

                    {% for user in users %}

                    <tr>

                        <td>

                            #{{ user.id }}

                        </td>

                        <td>

                            <span class="user-chip">

                                {{ user.username }}

                            </span>

                        </td>

                        <td>

                            <span class="expense-count">

                                {{ expenses_count[user.id] }}

                            </span>

                        </td>

                        <td>

                            <a
                                href="/view_user_expenses/{{ user.id }}"
                                class="btn view-btn"
                            >

                                <i class="fa-solid fa-chart-line"></i>

                                View Expenses

                            </a>

                        </td>

                    </tr>

                    {% endfor %}

                </tbody>

            </table>

        </div>

        <a
            href="/admin_user_management"
            class="btn back-btn"
        >

            <i class="fa-solid fa-arrow-left"></i>

            Back To User Management

        </a>

    </div>

</div>

</body>

</html>
