<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Printable Statement
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com"
    >

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
    >

    <style>

        *{

            font-family: 'Poppins', sans-serif;

        }

        body{

            background:
            linear-gradient(
                135deg,
                #071120,
                #0b1b38,
                #071120
            );

            color:white;

            min-height:100vh;

            padding:40px 20px;

        }

        .statement-card{

            background:
            rgba(10, 18, 40, 0.92);

            border-radius:28px;

            border:1px solid rgba(255,255,255,0.08);

            padding:40px;

            box-shadow:
            0 0 40px rgba(0,0,0,0.5);

            backdrop-filter: blur(16px);

        }

        .top-section{

            display:flex;

            justify-content:space-between;

            align-items:center;

            flex-wrap:wrap;

            gap:20px;

            margin-bottom:35px;

        }

        .heading{

            font-size:52px;

            font-weight:700;

            line-height:1.1;

            background:
            linear-gradient(
                90deg,
                #60a5fa,
                #38bdf8,
                #34d399
            );

            -webkit-background-clip:text;

            -webkit-text-fill-color:transparent;

        }

        .subtext{

            color:#cbd5e1;

            font-size:17px;

            margin-top:10px;

        }

        .print-badge{

            background:
            rgba(255,255,255,0.08);

            border:1px solid rgba(255,255,255,0.12);

            padding:14px 22px;

            border-radius:18px;

            font-size:16px;

            font-weight:600;

        }

        .table-wrapper{

            overflow-x:auto;

        }

        table{

            width:100%;

            border-collapse:separate;

            border-spacing:0 18px;

        }

        thead tr{

            background:#172b57;

        }

        thead th{

            padding:18px;

            color:#93c5fd;

            font-size:17px;

            font-weight:600;

        }

        thead th:first-child{

            border-top-left-radius:16px;
            border-bottom-left-radius:16px;

        }

        thead th:last-child{

            border-top-right-radius:16px;
            border-bottom-right-radius:16px;

        }

        tbody tr{

            background:
            rgba(255,255,255,0.92);

            transition:0.3s;

        }

        tbody tr:hover{

            transform:translateY(-2px);

        }

        tbody td{

            padding:18px;

            color:#111827;

            font-weight:500;

            vertical-align:middle;

            border-top:1px solid rgba(0,0,0,0.05);

            border-bottom:1px solid rgba(0,0,0,0.05);

        }

        tbody td:first-child{

            border-left:1px solid rgba(0,0,0,0.05);

            border-top-left-radius:18px;

            border-bottom-left-radius:18px;

        }

        tbody td:last-child{

            border-right:1px solid rgba(0,0,0,0.05);

            border-top-right-radius:18px;

            border-bottom-right-radius:18px;

        }

        .amount-pill{

            background:
            linear-gradient(
                135deg,
                #22c55e,
                #16a34a
            );

            color:white;

            padding:10px 18px;

            border-radius:14px;

            font-weight:700;

            display:inline-block;

            box-shadow:
            0 0 15px rgba(34,197,94,0.35);

        }

        .category-pill{

            background:
            rgba(59,130,246,0.12);

            color:#2563eb;

            padding:10px 18px;

            border-radius:14px;

            font-weight:600;

            display:inline-block;

            border:1px solid rgba(59,130,246,0.2);

        }

        .date-text{

            color:#374151;

            font-weight:600;

        }

        .bottom-bar{

            display:flex;

            justify-content:space-between;

            align-items:center;

            flex-wrap:wrap;

            gap:20px;

            margin-top:30px;

        }

        .record-box{

            background:
            rgba(255,255,255,0.08);

            border:1px solid rgba(255,255,255,0.08);

            padding:18px 24px;

            border-radius:18px;

            font-size:18px;

            font-weight:600;

        }

        .print-btn{

            border:none;

            background:
            linear-gradient(
                135deg,
                #3b82f6,
                #2563eb
            );

            color:white;

            padding:16px 34px;

            border-radius:18px;

            font-size:18px;

            font-weight:600;

            transition:0.3s;

            box-shadow:
            0 0 25px rgba(59,130,246,0.35);

        }

        .print-btn:hover{

            transform:translateY(-2px);

        }

        @media print {

            .print-btn{

                display:none;

            }

            body{

                background:white !important;

                padding:0;

            }

            .statement-card{

                box-shadow:none;

                border:none;

                background:white;

            }

        }

    </style>

</head>

<body onload="window.print()">

<div class="container">

    <div class="statement-card">

        <div class="top-section">

            <div>

                <div class="heading">

                    Expense Statement 📄

                </div>

                <div class="subtext">

                    Printable financial transaction report

                </div>

            </div>

            <div class="print-badge">

                Auto Print Enabled 🖨️

            </div>

        </div>

        <div class="table-wrapper">

            <table>

                <thead>

                    <tr>

                        <th>Category</th>

                        <th>Amount</th>

                        <th>Date</th>

                    </tr>

                </thead>

                <tbody>

                    {% for expense in expenses %}

                    <tr>

                        <!-- TITLE REMOVE KARDIA -->
                        <!-- CATEGORY USE KIYA -->

                        <td>

                            <span class="category-pill">

                                {{ expense.category }}

                            </span>

                        </td>

                        <td>

                            <span class="amount-pill">

                                Rs.{{ expense.amount }}

                            </span>

                        </td>

                        <td class="date-text">

                            {{ expense.date }}

                        </td>

                    </tr>

                    {% endfor %}

                </tbody>

            </table>

        </div>

        <div class="bottom-bar">

            <div class="record-box">

                Total Records:
                {{ expenses|length }}

            </div>

            <button
                onclick="window.print()"
                class="print-btn"
            >

                Print Again

            </button>

        </div>

    </div>

</div>

</body>

</html>
