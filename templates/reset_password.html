<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Reset Password
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com"
    >

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
    >

    <style>

        * {

            font-family: "Poppins", sans-serif;

        }

        body {

            min-height: 100vh;

            display: flex;
            align-items: center;
            justify-content: center;

            overflow-x: hidden;

            position: relative;

            color: white;

            background:
                radial-gradient(circle at top left, rgba(34,197,94,0.20), transparent 30%),
                radial-gradient(circle at bottom right, rgba(59,130,246,0.20), transparent 30%),
                linear-gradient(135deg, #020617, #0f172a, #111827);

        }

        body::before {

            content: "";

            position: absolute;

            width: 420px;
            height: 420px;

            background: rgba(34,197,94,0.12);

            border-radius: 50%;

            top: -140px;
            left: -120px;

            filter: blur(60px);

        }

        body::after {

            content: "";

            position: absolute;

            width: 380px;
            height: 380px;

            background: rgba(59,130,246,0.12);

            border-radius: 50%;

            bottom: -120px;
            right: -100px;

            filter: blur(60px);

        }

        .reset-card {

            position: relative;
            z-index: 5;

            width: 100%;
            max-width: 540px;

            background: rgba(15,23,42,0.88);

            border: 1px solid rgba(255,255,255,0.08);

            border-radius: 30px;

            padding: 42px;

            backdrop-filter: blur(18px);

            overflow: hidden;

            box-shadow:
                0 0 45px rgba(0,0,0,0.45),
                inset 0 0 0.5px rgba(255,255,255,0.18);

        }

        .reset-card::before {

            content: "";

            position: absolute;

            width: 220px;
            height: 220px;

            background: rgba(34,197,94,0.12);

            border-radius: 50%;

            top: -100px;
            right: -80px;

            filter: blur(30px);

        }

        .reset-card::after {

            content: "";

            position: absolute;

            width: 180px;
            height: 180px;

            background: rgba(59,130,246,0.12);

            border-radius: 50%;

            bottom: -80px;
            left: -70px;

            filter: blur(30px);

        }

        .content {

            position: relative;
            z-index: 2;

        }

        .icon-box {

            width: 95px;
            height: 95px;

            margin: auto;

            border-radius: 28px;

            background: linear-gradient(
                135deg,
                #22c55e,
                #3b82f6
            );

            display: flex;
            align-items: center;
            justify-content: center;

            font-size: 42px;

            box-shadow:
                0 18px 35px rgba(34,197,94,0.35);

        }

        .main-title {

            text-align: center;

            margin-top: 24px;

            font-size: 2.2rem;
            font-weight: 700;

            background: linear-gradient(
                90deg,
                #4ade80,
                #60a5fa,
                #38bdf8
            );

            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

        }

        .subtitle {

            text-align: center;

            color: #cbd5e1;

            margin-top: 12px;

            margin-bottom: 34px;

            font-size: 15px;

        }

        .form-label {

            color: #e2e8f0;

            font-weight: 500;

            margin-bottom: 10px;

        }

        .form-control {

            background: rgba(255,255,255,0.06) !important;

            border: 1px solid rgba(255,255,255,0.08) !important;

            color: white !important;

            border-radius: 16px;

            padding: 15px 18px;

            font-size: 15px;

            transition: 0.3s ease;

        }

        .form-control::placeholder {

            color: #94a3b8;

        }

        .form-control:focus {

            background: rgba(255,255,255,0.08) !important;

            border-color: #22c55e !important;

            box-shadow:
                0 0 0 4px rgba(34,197,94,0.15);

        }

        .password-box {

            position: relative;

        }

        .password-box i {

            position: absolute;

            top: 50%;
            right: 18px;

            transform: translateY(-50%);

            color: #94a3b8;

            cursor: pointer;

            font-style: normal;

            user-select: none;

        }

        .btn-reset {

            width: 100%;

            border: none;

            padding: 15px;

            border-radius: 16px;

            font-size: 16px;
            font-weight: 600;

            color: white;

            margin-top: 10px;

            background: linear-gradient(
                135deg,
                #22c55e,
                #16a34a
            );

            box-shadow:
                0 15px 30px rgba(34,197,94,0.30);

            transition: 0.3s ease;

        }

        .btn-reset:hover {

            transform: translateY(-3px);

        }

        .alert {

            border: none;

            border-radius: 16px;

            padding: 15px 18px;

            margin-bottom: 24px;

            font-weight: 500;

            background: rgba(251,191,36,0.15);

            color: #fde68a;

            border: 1px solid rgba(251,191,36,0.20);

        }

        .security-note {

            margin-top: 28px;

            background: rgba(255,255,255,0.05);

            border: 1px solid rgba(255,255,255,0.08);

            border-radius: 18px;

            padding: 16px 18px;

            color: #cbd5e1;

            font-size: 14px;

            display: flex;
            align-items: center;
            gap: 12px;

        }

        .security-note span {

            font-size: 18px;

        }

        @media(max-width:576px) {

            .reset-card {

                padding: 28px 22px;

                border-radius: 24px;

            }

            .main-title {

                font-size: 1.8rem;

            }

        }

        /* FIX AUTOFILL WHITE BACKGROUND ISSUE */
input:-webkit-autofill,
input:-webkit-autofill:hover,
input:-webkit-autofill:focus,
input:-webkit-autofill:active {
    -webkit-box-shadow: 0 0 0px 1000px #111827 inset !important;
    -webkit-text-fill-color: white !important;
    caret-color: white;
    transition: background-color 9999s ease-in-out 0s;
}

    </style>

</head>

<body>

<div class="reset-card">

    <div class="content">

        <!-- ICON -->

        <div class="icon-box">

            🔐

        </div>

        <!-- TITLE -->

        <h1 class="main-title">

            Reset Password

        </h1>

        <p class="subtitle">

            Create a strong new password to secure your account

        </p>

        <!-- FLASH MESSAGES -->

        {% with messages = get_flashed_messages() %}

            {% if messages %}

                {% for msg in messages %}

                    <div class="alert">

                        {{ msg }}

                    </div>

                {% endfor %}

            {% endif %}

        {% endwith %}

        <!-- FORM -->

        <form method="POST">

            <label class="form-label">

                New Password

            </label>

            <div class="password-box mb-4">

                <input
                    type="password"
                    name="new_password"
                    id="newPassword"
                    class="form-control"
                    placeholder="Enter New Password"
                    required
                >

                <i onclick="togglePassword('newPassword', this)">

                    👁️

                </i>

            </div>

            <label class="form-label">

                Confirm Password

            </label>

            <div class="password-box">

                <input
                    type="password"
                    name="confirm_password"
                    id="confirmPassword"
                    class="form-control"
                    placeholder="Confirm New Password"
                    required
                >

                <i onclick="togglePassword('confirmPassword', this)">

                    👁️

                </i>

            </div>

            <button
                class="btn-reset"
            >

                Reset Password

            </button>

        </form>

        <!-- SECURITY NOTE -->

        <div class="security-note">

            <span>

                🛡️

            </span>

            <div>

                Use a strong password with letters, numbers, and symbols for better protection.

            </div>

        </div>

    </div>

</div>

<script>

function togglePassword(id, icon) {

    const input = document.getElementById(id);

    if (input.type === "password") {

        input.type = "text";

        icon.innerHTML = "🙈";

    }

    else {

        input.type = "password";

        icon.innerHTML = "👁️";

    }

}

</script>

</body>

</html>
