<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Edit Budget
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    >

    <style>

        body {

            min-height: 100vh;

            background:
                radial-gradient(circle at top left, #112240 0%, transparent 30%),
                radial-gradient(circle at bottom right, #1d3557 0%, transparent 30%),
                linear-gradient(135deg, #0b1220, #101827, #151d2f);

            display: flex;

            align-items: center;

            justify-content: center;

            overflow-x: hidden;

            color: white;

        }

        .budget-card {

            width: 100%;
            max-width: 620px;

            background: rgba(255,255,255,0.08);

            backdrop-filter: blur(20px);

            border: 1px solid rgba(255,255,255,0.08);

            border-radius: 32px;

            padding: 45px;

            box-shadow:
                0 15px 40px rgba(0,0,0,0.55),
                inset 0 1px 0 rgba(255,255,255,0.05);

            position: relative;

            overflow: hidden;

        }

        .budget-card::before {

            content: "";

            position: absolute;

            width: 260px;
            height: 260px;

            background: rgba(255, 193, 7, 0.12);

            border-radius: 50%;

            top: -120px;
            right: -100px;

            filter: blur(10px);

        }

        .budget-icon {

            width: 100px;
            height: 100px;

            margin: auto;

            border-radius: 50%;

            display: flex;
            align-items: center;
            justify-content: center;

            background:
                linear-gradient(135deg, #ffc107, #ff9800);

            box-shadow:
                0 0 35px rgba(255, 193, 7, 0.4);

            font-size: 42px;

            color: #111;

            margin-bottom: 28px;

        }

        .page-title {

            text-align: center;

            font-size: 38px;

            font-weight: 800;

            margin-bottom: 10px;

            background: linear-gradient(
                to right,
                #ffffff,
                #ffe082,
                #ffca28
            );

            -webkit-background-clip: text;

            -webkit-text-fill-color: transparent;

        }

        .page-subtitle {

            text-align: center;

            color: #c9d4e8;

            font-size: 16px;

            line-height: 1.8;

            margin-bottom: 35px;

        }

        .form-label {

            color: #ffffff;

            font-weight: 700;

            margin-bottom: 12px;

            font-size: 15px;

            letter-spacing: 0.5px;

        }

        .input-wrapper {

            position: relative;

        }

        .currency-icon {

            position: absolute;

            top: 50%;

            left: 18px;

            transform: translateY(-50%);

            color: #ffc107;

            font-size: 18px;

            z-index: 5;

        }

        .form-control {

            height: 58px;

            background: rgba(255,255,255,0.06) !important;

            border: 1px solid rgba(255,255,255,0.10) !important;

            border-radius: 18px;

            color: white !important;

            padding-left: 52px;

            font-size: 17px;

            font-weight: 600;

            transition: 0.3s ease;

            box-shadow: none !important;

        }

        .form-control:focus {

            border-color: #ffc107 !important;

            box-shadow:
                0 0 0 0.22rem rgba(255,193,7,0.20) !important;

            background: rgba(255,255,255,0.09) !important;

        }

        .form-control::placeholder {

            color: #c4c9d4;

        }

        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {

            -webkit-appearance: none;

            margin: 0;

        }

        .save-btn {

            margin-top: 28px;

            width: 100%;

            border: none;

            border-radius: 18px;

            padding: 15px;

            font-size: 17px;

            font-weight: 700;

            color: #111;

            background:
                linear-gradient(135deg, #ffc107, #ff9800);

            transition: 0.3s ease;

            box-shadow:
                0 12px 28px rgba(255,193,7,0.25);

        }

        .save-btn:hover {

            transform: translateY(-3px);

            box-shadow:
                0 16px 34px rgba(255,193,7,0.38);

        }

        .back-btn {

            width: 100%;

            margin-top: 16px;

            border-radius: 16px;

            padding: 13px;

            font-weight: 700;

            background:
                linear-gradient(135deg, #1d2636, #111827);

            border: 1px solid rgba(255,255,255,0.08);

            color: white;

            transition: 0.3s ease;

        }

        .back-btn:hover {

            transform: translateY(-2px);

            background:
                linear-gradient(135deg, #273245, #192234);

            color: white;

        }

        .info-box {

            margin-top: 28px;

            background: rgba(255,255,255,0.05);

            border-radius: 18px;

            border: 1px solid rgba(255,255,255,0.06);

            padding: 18px;

            color: #d8dfec;

            line-height: 1.7;

            font-size: 14px;

        }

        @media(max-width:768px) {

            .budget-card {

                padding: 30px 22px;

            }

            .page-title {

                font-size: 30px;

            }

        }

        /* FIX AUTOFILL WHITE BACKGROUND ISSUE */
input:-webkit-autofill,
input:-webkit-autofill:hover,
input:-webkit-autofill:focus,
input:-webkit-autofill:active {
    -webkit-box-shadow: 0 0 0px 1000px #111827 inset !important;
    -webkit-text-fill-color: white !important;
    caret-color: white;
    transition: background-color 9999s ease-in-out 0s;
}

    </style>

</head>

<body>

<div class="container">

    <div class="budget-card">

        <!-- ICON -->

        <div class="budget-icon">

            <i class="fa-solid fa-wallet"></i>

        </div>

        <!-- TITLE -->

        <h1 class="page-title">

            Edit Monthly Budget

        </h1>

        <p class="page-subtitle">

            Update your monthly spending limit to manage expenses smarter and maintain better financial discipline.

        </p>

        <!-- FORM -->

        <form method="POST">

            <div class="mb-3">

                <label class="form-label">

                    Monthly Budget

                </label>

                <div class="input-wrapper">

                    <span class="currency-icon">

                        <i class="fa-solid fa-indian-rupee-sign"></i>

                    </span>

                    <input
                        type="number"
                        name="budget"
                        class="form-control"
                        placeholder="Enter your monthly budget"
                        required
                    >

                </div>

            </div>

            <!-- BUTTON -->

            <button
                type="submit"
                class="save-btn"
            >

                <i class="fa-solid fa-floppy-disk me-2"></i>

                Save Budget

            </button>

        </form>

        <!-- INFO -->

        <div class="info-box">

            💡 Setting a proper monthly budget helps you track overspending and gives smarter expense insights throughout the app.

        </div>

        <!-- BACK -->

        <a
            href="/money_budget"
            class="btn back-btn"
        >

            <i class="fa-solid fa-arrow-left me-2"></i>

            Back

        </a>

    </div>

</div>

</body>

</html>
