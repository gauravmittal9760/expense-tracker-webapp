<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Add Expense
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    >

    <style>

        body {

            background:
                linear-gradient(
                    135deg,
                    #0f172a,
                    #111827,
                    #1e293b
                );

            min-height: 100vh;

            color: white;

            overflow-x: hidden;

            position: relative;

        }

        .top-glow {

            position: absolute;

            width: 350px;

            height: 350px;

            background:
                rgba(59,130,246,0.22);

            filter: blur(110px);

            top: -120px;

            left: -100px;

            z-index: 0;

        }

        .bottom-glow {

            position: absolute;

            width: 350px;

            height: 350px;

            background:
                rgba(16,185,129,0.18);

            filter: blur(110px);

            bottom: -120px;

            right: -100px;

            z-index: 0;

        }

        .expense-card {

            position: relative;

            z-index: 1;

            background:
                rgba(15,23,42,0.88);

            backdrop-filter: blur(16px);

            border:
                1px solid rgba(255,255,255,0.08);

            border-radius: 28px;

            box-shadow:
                0 20px 50px rgba(0,0,0,0.40);

        }

        .expense-title {

            font-size: 42px;

            font-weight: 800;

            text-align: center;

            background:
                linear-gradient(
                    90deg,
                    #38bdf8,
                    #818cf8,
                    #22c55e
                );

            -webkit-background-clip: text;

            -webkit-text-fill-color: transparent;

            letter-spacing: 1px;

        }

        .subtitle {

            text-align: center;

            color: rgba(255,255,255,0.68);

            margin-top: 10px;

            margin-bottom: 45px;

            font-size: 15px;

        }

        .input-label {

            font-size: 15px;

            font-weight: 600;

            color: #dbeafe;

            margin-bottom: 10px;

        }

        .form-control {

            background:
                rgba(255,255,255,0.05) !important;

            border:
                1px solid rgba(255,255,255,0.10) !important;

            color: white !important;

            border-radius: 16px;

            padding: 15px 18px;

            font-size: 15px;

            transition: 0.25s;

        }

        .form-control:focus {

            background:
                rgba(255,255,255,0.07) !important;

            border-color:
                #38bdf8 !important;

            box-shadow:
                0 0 0 4px rgba(56,189,248,0.15);

        }

        .form-control::placeholder {

            color:
                rgba(255,255,255,0.45);

        }

        textarea.form-control {

            resize: none;

        }

        input[type="date"]::-webkit-calendar-picker-indicator {

            filter: invert(1);

            cursor: pointer;

        }

        input[type="file"] {

            padding: 14px;

        }

        .upload-box {

            background:
                linear-gradient(
                    135deg,
                    rgba(59,130,246,0.12),
                    rgba(16,185,129,0.10)
                );

            border:
                1px dashed rgba(255,255,255,0.18);

            border-radius: 20px;

            padding: 24px;

        }

        .upload-text {

            color:
                rgba(255,255,255,0.70);

            font-size: 14px;

        }

        .btn-success {

            border: none;

            border-radius: 16px;

            padding: 15px;

            font-size: 18px;

            font-weight: 700;

            background:
                linear-gradient(
                    90deg,
                    #22c55e,
                    #16a34a
                );

            transition: 0.30s;

            box-shadow:
                0 10px 25px rgba(34,197,94,0.25);

        }

        .btn-success:hover {

            transform: translateY(-3px);

            box-shadow:
                0 14px 30px rgba(34,197,94,0.35);

        }

        .input-group-icon {

            position: relative;

        }

        .input-group-icon i {

            position: absolute;

            top: 50%;

            left: 16px;

            transform: translateY(-50%);

            color:
                rgba(255,255,255,0.55);

            z-index: 2;

        }

        .input-group-icon .form-control {

            padding-left: 48px;

        }

        .textarea-icon i {

            top: 24px;

            transform: none;

        }

        @media(max-width: 768px) {

            .expense-title {

                font-size: 32px;

            }

            .expense-card {

                padding: 30px !important;

            }

        }

        /* FIX AUTOFILL WHITE BACKGROUND ISSUE */
        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus,
        input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0px 1000px #111827 inset !important;
            -webkit-text-fill-color: white !important;
            caret-color: white;
            transition: background-color 9999s ease-in-out 0s;
        }

    </style>

</head>

<body>

<div class="top-glow"></div>

<div class="bottom-glow"></div>

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-7">

            <div class="card expense-card p-4 p-lg-5">

                <!-- TITLE -->

                <h2 class="expense-title">

                    Add Expense 💸

                </h2>

                <div class="subtitle">

                    Track every spending smartly and manage your finances like a pro.

                </div>

                <!-- FORM -->

                <form
                    method="POST"
                    enctype="multipart/form-data"
                >

                    <!-- CATEGORY -->

                    <div class="mb-4">

                        <label class="input-label">

                            Expense Category

                        </label>

                        <div class="input-group-icon">

                            <i class="fa-solid fa-layer-group"></i>

                            <input
                                type="text"
                                name="category"
                                class="form-control"
                                placeholder="Enter Expense Category"
                                required
                            >

                        </div>

                    </div>

                    <!-- DESCRIPTION -->

                    <div class="mb-4">

                        <label class="input-label">

                            Description

                        </label>

                        <div class="input-group-icon textarea-icon">

                            <i class="fa-solid fa-pen"></i>

                            <textarea
                                name="description"
                                class="form-control"
                                placeholder="Write expense details..."
                                rows="4"
                            ></textarea>

                        </div>

                    </div>

                    <!-- AMOUNT -->

                    <div class="mb-4">

                        <label class="input-label">

                            Amount

                        </label>

                        <div class="input-group-icon">

                            <i class="fa-solid fa-indian-rupee-sign"></i>

                            <input
                                type="number"
                                name="amount"
                                class="form-control"
                                placeholder="Enter Amount"
                                required
                            >

                        </div>

                    </div>

                    <!-- DATE -->

                    <div class="mb-4">

                        <label class="input-label">

                            Expense Date

                        </label>

                        <div class="input-group-icon">

                            <i class="fa-solid fa-calendar-days"></i>

                            <input
                                type="date"
                                name="date"
                                class="form-control"
                                required
                            >

                        </div>

                    </div>

                    <!-- IMAGE -->

                    <div class="upload-box mb-4">

                        <label class="input-label">

                            <i class="fa-solid fa-images me-2"></i>

                            Upload Expense Image

                        </label>

                        <input
                            type="file"
                            name="images"
                            class="form-control custom-input"
                            multiple
                            accept="image/*"
                        >

                        <div class="upload-text mt-3">

                            Add bill screenshots, receipts or payment proof (optional).

                        </div>

                    </div>

                    <!-- BUTTON -->

                    <button class="btn btn-success w-100">

                        <i class="fa-solid fa-plus me-2"></i>

                        Add Expense

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

</body>

</html>
