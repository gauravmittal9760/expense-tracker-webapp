<!DOCTYPE html>
<html>

<head>

    <title>
        Current Balance
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    >

    <style>

        body {

            min-height: 100vh;

            background:
                radial-gradient(circle at top left, #16222A 0%, #0f2027 45%, #020406 100%);

            overflow: hidden;

            position: relative;

            color: white;

        }

        .bg-glow {

            position: absolute;

            width: 350px;

            height: 350px;

            border-radius: 50%;

            filter: blur(120px);

            opacity: 0.22;

            z-index: 0;

        }

        .glow1 {

            background: #00ffb3;

            top: -120px;

            left: -100px;

        }

        .glow2 {

            background: #ffc107;

            bottom: -140px;

            right: -100px;

        }

        .balance-card {

            position: relative;

            z-index: 2;

            background: rgba(17, 25, 40, 0.92);

            backdrop-filter: blur(22px);

            border-radius: 34px;

            border: 1px solid rgba(255,255,255,0.08);

            overflow: hidden;

            box-shadow:
                0 0 50px rgba(0,0,0,0.55),
                0 0 30px rgba(0,255,179,0.12);

        }

        .balance-card::before {

            content: "";

            position: absolute;

            top: 0;

            left: 0;

            width: 100%;

            height: 5px;

            background: linear-gradient(
                90deg,
                #00ffb3,
                #ffc107,
                #00d4ff
            );

        }

        .title {

            font-size: 42px;

            font-weight: 800;

            background: linear-gradient(
                90deg,
                #ffffff,
                #9bffdc,
                #ffe082
            );

            -webkit-background-clip: text;

            -webkit-text-fill-color: transparent;

            letter-spacing: 0.5px;

        }

        .subtitle {

            color: #c8d1df;

            font-size: 16px;

            line-height: 1.8;

            margin-top: 12px;

        }

        .balance-box {

            margin-top: 40px;

            background: linear-gradient(
                135deg,
                rgba(0,255,179,0.12),
                rgba(255,193,7,0.12)
            );

            border: 1px solid rgba(255,255,255,0.08);

            border-radius: 28px;

            padding: 40px 25px;

            position: relative;

            overflow: hidden;

        }

        .balance-box::after {

            content: "";

            position: absolute;

            width: 180px;

            height: 180px;

            background: rgba(255,255,255,0.05);

            border-radius: 50%;

            top: -70px;

            right: -70px;

        }

        .balance-label {

            font-size: 18px;

            color: #e4edf8;

            letter-spacing: 1px;

            text-transform: uppercase;

        }

        .balance-amount {

            font-size: 62px;

            font-weight: 800;

            color: #ffe082;

            margin-top: 18px;

            text-shadow:
                0 0 15px rgba(255,224,130,0.35);

            word-break: break-word;

        }

        .balance-icon {

            width: 110px;

            height: 110px;

            border-radius: 50%;

            background: linear-gradient(
                135deg,
                rgba(0,255,179,0.25),
                rgba(255,193,7,0.25)
            );

            display: flex;

            align-items: center;

            justify-content: center;

            margin: 0 auto 28px auto;

            font-size: 46px;

            color: #ffffff;

            box-shadow:
                0 0 30px rgba(0,255,179,0.18);

        }

        .info-box {

            margin-top: 28px;

            background: rgba(255,255,255,0.04);

            border: 1px solid rgba(255,255,255,0.06);

            border-radius: 20px;

            padding: 18px;

            color: #cfd9e7;

            font-size: 15px;

            line-height: 1.7;

        }

        .back-btn {

            margin-top: 35px;

            border-radius: 16px;

            padding: 14px;

            font-size: 17px;

            font-weight: 700;

            transition: 0.3s ease;

        }

        .back-btn:hover {

            transform: translateY(-3px);

            box-shadow:
                0 12px 28px rgba(220,53,69,0.30);

        }

        /* GLOBAL AUTOFILL FIX  */
input:-webkit-autofill,
input:-webkit-autofill:hover,
input:-webkit-autofill:focus,
input:-webkit-autofill:active {
    -webkit-box-shadow: 0 0 0px 1000px #111827 inset !important;
    -webkit-text-fill-color: white !important;
    caret-color: white;
    transition: background-color 9999s ease-in-out 0s;
}

    </style>

</head>

<body>

<div class="bg-glow glow1"></div>
<div class="bg-glow glow2"></div>

<div class="container d-flex align-items-center justify-content-center min-vh-100">

    <div class="row justify-content-center w-100">

        <div class="col-lg-6 col-md-8">

            <div class="balance-card p-4 p-md-5 text-center">

                <!-- ICON -->

                <div class="balance-icon">

                    <i class="fa-solid fa-wallet"></i>

                </div>

                <!-- TITLE -->

                <h1 class="title">

                    Current Balance

                </h1>

                <p class="subtitle">

                    Track your available balance in real-time and manage your finances more efficiently with smart budgeting.

                </p>

                <!-- BALANCE BOX -->

                <div class="balance-box">

                    <div class="balance-label">

                        Available Balance

                    </div>

                    <div class="balance-amount">

                        ₹{{ balance }}

                    </div>

                </div>

                <!-- INFO -->

                <div class="info-box">

                    💡 Your current balance updates automatically based on income entries and expense deductions inside your Expense Tracker.

                </div>

                <!-- BACK BUTTON -->

                <a
                    href="/money_budget"
                    class="btn btn-danger w-100 back-btn"
                >

                    <i class="fa-solid fa-arrow-left me-2"></i>

                    Back

                </a>

            </div>

        </div>

    </div>

</div>

</body>

</html>
