<!DOCTYPE html>
<html>

<head>

    <title>
        Change Currency
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    >

    <style>

        body {

            min-height: 100vh;

            background:
                radial-gradient(circle at top right, #1f3b73 0%, #0a0f1f 45%, #05070d 100%);

            color: white;

            overflow: hidden;

            position: relative;

        }

        .floating-glow {

            position: absolute;

            width: 350px;

            height: 350px;

            border-radius: 50%;

            filter: blur(100px);

            opacity: 0.22;

            z-index: 0;

        }

        .glow1 {

            background: #0d6efd;

            top: -120px;

            right: -100px;

        }

        .glow2 {

            background: #20c997;

            bottom: -140px;

            left: -100px;

        }

        .currency-card {

            position: relative;

            z-index: 2;

            background: rgba(17, 25, 40, 0.92);

            backdrop-filter: blur(18px);

            border-radius: 28px;

            border: 1px solid rgba(255,255,255,0.08);

            box-shadow:
                0 0 40px rgba(0,0,0,0.45),
                0 0 18px rgba(13,110,253,0.15);

            overflow: hidden;

        }

        .currency-card::before {

            content: "";

            position: absolute;

            top: 0;

            left: 0;

            width: 100%;

            height: 5px;

            background: linear-gradient(
                90deg,
                #0d6efd,
                #20c997,
                #0dcaf0
            );

        }

        .title {

            font-size: 38px;

            font-weight: 800;

            letter-spacing: 1px;

            background: linear-gradient(
                90deg,
                #ffffff,
                #79b8ff,
                #d9ecff
            );

            -webkit-background-clip: text;

            -webkit-text-fill-color: transparent;

        }

        .subtitle {

            color: #c4cfdf;

            font-size: 15px;

        }

        .currency-box {

            background: rgba(255,255,255,0.04);

            border-radius: 20px;

            padding: 25px;

            border: 1px solid rgba(255,255,255,0.06);

        }

        .form-select {

            background-color: #161d2e !important;

            color: white !important;

            border: 1px solid rgba(255,255,255,0.12) !important;

            border-radius: 16px;

            padding: 16px;

            font-size: 17px;

            transition: 0.3s ease;

            box-shadow: none !important;

        }

        .form-select:focus {

            border-color: #0dcaf0 !important;

            box-shadow:
                0 0 0 0.20rem rgba(13,202,240,0.18) !important;

        }

        .save-btn {

            background: linear-gradient(
                135deg,
                #0dcaf0,
                #0d6efd
            );

            border: none;

            border-radius: 16px;

            padding: 14px;

            font-size: 17px;

            font-weight: 700;

            transition: 0.3s ease;

            color: white;

            letter-spacing: 0.5px;

        }

        .save-btn:hover {

            transform: translateY(-3px);

            box-shadow:
                0 10px 25px rgba(13,202,240,0.35);

        }

        .back-btn {

            border-radius: 16px;

            padding: 14px;

            font-weight: 600;

            transition: 0.3s ease;

        }

        .back-btn:hover {

            transform: translateY(-3px);

            box-shadow:
                0 10px 25px rgba(255,255,255,0.12);

        }

        .currency-preview {

            display: flex;

            justify-content: space-between;

            align-items: center;

            background: linear-gradient(
                135deg,
                rgba(13,110,253,0.16),
                rgba(32,201,151,0.12)
            );

            border: 1px solid rgba(255,255,255,0.08);

            border-radius: 18px;

            padding: 18px 20px;

            margin-bottom: 24px;

        }

        .currency-preview h5 {

            margin: 0;

            font-weight: 600;

            color: #d9e6ff;

        }

        .currency-preview span {

            font-size: 24px;

            font-weight: 800;

            color: #ffffff;

        }

        .alert {

            border-radius: 14px;

            border: none;

            font-weight: 600;

        }

        /* FIX AUTOFILL WHITE BACKGROUND ISSUE */
input:-webkit-autofill,
input:-webkit-autofill:hover,
input:-webkit-autofill:focus,
input:-webkit-autofill:active {
    -webkit-box-shadow: 0 0 0px 1000px #111827 inset !important;
    -webkit-text-fill-color: white !important;
    caret-color: white;
    transition: background-color 9999s ease-in-out 0s;
}

    </style>

</head>

<body>

<div class="floating-glow glow1"></div>
<div class="floating-glow glow2"></div>

<div class="container d-flex align-items-center justify-content-center min-vh-100">

    <div class="row justify-content-center w-100">

        <div class="col-lg-5 col-md-7">

            <div class="currency-card p-4 p-md-5">

                <!-- TITLE -->

                <div class="text-center mb-4">

                    <h1 class="title">

                        <i class="fa-solid fa-money-bill-transfer me-2"></i>

                        Change Currency

                    </h1>

                    <p class="subtitle mt-3">

                        Customize your preferred currency for all expense tracking and analytics.

                    </p>

                </div>

                <!-- FLASH MESSAGES -->

                {% with messages = get_flashed_messages(with_categories=true) %}

                    {% if messages %}

                        {% for category, message in messages %}

                            <div class="alert alert-{{ category }} mb-4">

                                {{ message }}

                            </div>

                        {% endfor %}

                    {% endif %}

                {% endwith %}

                <!-- PREVIEW CARD -->

                <div class="currency-preview">

                    <div>

                        <h5>
                            Active Currency
                        </h5>

                    </div>

                    <span>
                        💱
                    </span>

                </div>

                <!-- FORM -->

                <div class="currency-box">

                    <form method="POST">

                        <div class="mb-4">

                            <label class="form-label mb-3 fw-semibold">

                                Select Currency

                            </label>

                            <select
                                name="currency"
                                class="form-select"
                            >

                                <option>
                                    INR
                                </option>

                                <option>
                                    USD
                                </option>

                                <option>
                                    EUR
                                </option>

                                <option>
                                    AED
                                </option>

                            </select>

                        </div>

                        <button
                            class="save-btn w-100"
                        >

                            <i class="fa-solid fa-floppy-disk me-2"></i>

                            Save Currency

                        </button>

                    </form>

                    <a
                        href="/settings_storage"
                        class="btn btn-light w-100 mt-4 back-btn"
                    >

                        <i class="fa-solid fa-arrow-left me-2"></i>

                        Back

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
