<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"

>

<title>

Verify Admin Access

</title>

<link
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
rel="stylesheet"
>

<style>

*{

    margin:0;

    padding:0;

    box-sizing:border-box;
}

body{

    font-family:
    "Segoe UI",
    sans-serif;

    min-height:100vh;

    overflow:hidden;

    display:flex;

    justify-content:center;

    align-items:center;

    background:
    radial-gradient(
        circle at top left,
        #111827,
        #020617 55%,
        #000
    );

    position:relative;

    color:white;
}

/* =========================
   Animated Cyber Grid
========================= */

.grid{

    position:absolute;

    inset:0;

    background-image:
    linear-gradient(
        rgba(255,255,255,0.05) 1px,
        transparent 1px
    ),
    linear-gradient(
        90deg,
        rgba(255,255,255,0.05) 1px,
        transparent 1px
    );

    background-size:45px 45px;

    animation:
    gridMove 14s linear infinite;

    z-index:0;
}

@keyframes gridMove{

    from{

        transform:
        translateY(0px);
    }

    to{

        transform:
        translateY(45px);
    }
}

/* =========================
   Floating Neon Blobs
========================= */

.blob{

    position:absolute;

    border-radius:50%;

    filter:blur(90px);

    opacity:0.42;

    animation:
    floatBlob 9s ease-in-out infinite;
}

.blob1{

    width:320px;

    height:320px;

    background:#00e5ff;

    top:-120px;

    left:-80px;
}

.blob2{

    width:260px;

    height:260px;

    background:#00ff95;

    bottom:-120px;

    right:-60px;

    animation-delay:2s;
}

.blob3{

    width:200px;

    height:200px;

    background:#8b5cf6;

    top:40%;

    left:58%;

    animation-delay:4s;
}

@keyframes floatBlob{

    0%{

        transform:
        translateY(0px)
        scale(1);
    }

    50%{

        transform:
        translateY(-28px)
        scale(1.08);
    }

    100%{

        transform:
        translateY(0px)
        scale(1);
    }
}

/* =========================
   Floating Particles
========================= */

.particle{

    position:absolute;

    width:5px;

    height:5px;

    border-radius:50%;

    background:white;

    opacity:0.3;

    animation:
    particleMove linear infinite;
}

.p1{

    left:10%;

    animation-duration:13s;
}

.p2{

    left:25%;

    animation-duration:18s;
}

.p3{

    left:45%;

    animation-duration:14s;
}

.p4{

    left:68%;

    animation-duration:20s;
}

.p5{

    left:85%;

    animation-duration:15s;
}

@keyframes particleMove{

    from{

        transform:
        translateY(110vh)
        scale(0);
    }

    to{

        transform:
        translateY(-10vh)
        scale(1.6);
    }
}

/* =========================
   Main Verify Box
========================= */

.box{

    width:460px;

    background:
    rgba(15,23,42,0.82);

    border:
    1px solid rgba(255,255,255,0.08);

    border-radius:34px;

    padding:45px;

    backdrop-filter:blur(22px);

    box-shadow:
    0 0 60px rgba(0,255,255,0.14);

    position:relative;

    overflow:hidden;

    z-index:2;

    animation:
    floatCard 5s ease-in-out infinite;
}

.box::before{

    content:"";

    position:absolute;

    width:240px;

    height:240px;

    background:
    radial-gradient(
        circle,
        rgba(0,255,255,0.25),
        transparent 70%
    );

    top:-100px;

    right:-80px;
}

.box::after{

    content:"";

    position:absolute;

    width:190px;

    height:190px;

    background:
    radial-gradient(
        circle,
        rgba(0,255,149,0.18),
        transparent 70%
    );

    bottom:-70px;

    left:-60px;
}

@keyframes floatCard{

    0%{

        transform:
        translateY(0px);
    }

    50%{

        transform:
        translateY(-8px);
    }

    100%{

        transform:
        translateY(0px);
    }
}

/* =========================
   Logo
========================= */

.logo{

    width:95px;

    height:95px;

    margin:auto;

    margin-bottom:24px;

    border-radius:28px;

    background:
    linear-gradient(
        135deg,
        #00e5ff,
        #00ff95
    );

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:42px;

    color:#02131f;

    box-shadow:
    0 0 30px rgba(0,255,255,0.4);

    animation:
    pulseLogo 3s infinite;
}

@keyframes pulseLogo{

    0%{

        transform:scale(1);
    }

    50%{

        transform:scale(1.08);
    }

    100%{

        transform:scale(1);
    }
}

/* =========================
   Title
========================= */

.title{

    font-size:50px;

    font-weight:900;

    text-align:center;

    margin-bottom:12px;

    background:
    linear-gradient(
        90deg,
        #00f7ff,
        #00ff95,
        #ffffff
    );

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;
}

.subtitle{

    text-align:center;

    color:#c6d1df;

    font-size:15px;

    margin-bottom:35px;

    line-height:1.7;
}

/* =========================
   Input
========================= */

.input-box{

    display:flex;

    align-items:center;

    background:
    rgba(255,255,255,0.05);

    border:
    1px solid rgba(255,255,255,0.08);

    border-radius:20px;

    overflow:hidden;

    transition:0.35s;

    margin-bottom:28px;

    position:relative;
}

.input-box::before{

    content:"";

    position:absolute;

    left:-100%;

    top:0;

    width:100%;

    height:100%;

    background:
    linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,0.08),
        transparent
    );

    transition:0.6s;
}

.input-box:hover::before{

    left:100%;
}

.input-box:focus-within{

    border-color:#00e5ff;

    box-shadow:
    0 0 20px rgba(0,229,255,0.18);

    transform:
    translateY(-2px);
}

.icon{

    width:65px;

    text-align:center;

    font-size:20px;

    color:#00f7ff;
}

.input{

    width:100%;

    height:62px;

    border:none;

    outline:none;

    background:transparent;

    color:white;

    font-size:17px;

    padding-right:18px;
}

.input::placeholder{

    color:#97a7ba;
}

/* =========================
   Button
========================= */

.btn{

    width:100%;

    height:64px;

    border:none;

    border-radius:22px;

    font-size:20px;

    font-weight:900;

    cursor:pointer;

    background:
    linear-gradient(
        135deg,
        #00e5ff,
        #00ff95
    );

    color:#02131f;

    position:relative;

    overflow:hidden;

    transition:0.35s;
}

.btn::before{

    content:"";

    position:absolute;

    inset:0;

    background:
    linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,0.45),
        transparent
    );

    transform:
    translateX(-100%);
}

.btn:hover::before{

    animation:
    shine 1s linear;
}

@keyframes shine{

    to{

        transform:
        translateX(100%);
    }
}

.btn:hover{

    transform:
    translateY(-4px)
    scale(1.01);

    box-shadow:
    0 0 28px rgba(0,255,149,0.3);
}

/* =========================
   Bottom Glow Line
========================= */

.bottom-line{

    width:100px;

    height:4px;

    margin:auto;

    margin-top:26px;

    border-radius:20px;

    background:
    linear-gradient(
        90deg,
        #00e5ff,
        #00ff95
    );

    box-shadow:
    0 0 15px rgba(0,255,255,0.6);
}

/* =========================
   Responsive
========================= */

@media(max-width:600px){

    .box{

        width:92%;

        padding:35px 24px;
    }

    .title{

        font-size:38px;
    }
}

</style>

</head>

<body>

<div class="grid"></div>

<div class="blob blob1"></div>

<div class="blob blob2"></div>

<div class="blob blob3"></div>

<div class="particle p1"></div>
<div class="particle p2"></div>
<div class="particle p3"></div>
<div class="particle p4"></div>
<div class="particle p5"></div>

<form
    method="POST"
    class="box"
>

<div class="logo">

    <i class="fa-solid fa-shield-halved"></i>

</div>

<div class="title">

    Verify Admin

</div>

<div class="subtitle">

    Supreme Secure Verification Portal 🔐
    <br>
    Only authorized admin access is allowed

</div>

<div class="input-box">

    <div class="icon">

        <i class="fa-solid fa-lock"></i>

    </div>

    <input

        type="password"

        name="admin_panel_password"

        placeholder="Enter Admin Panel Password"

        class="input"

        required

    >

</div>

<button class="btn">

    Enter Admin Panel

</button>

<div class="bottom-line"></div>

</form>

</body>

</html>
