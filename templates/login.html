<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>
Expense Tracker • Login
</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet"
>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
rel="stylesheet"
>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{

    --cyan:#00ffe5;
    --blue:#3b82f6;
    --purple:#8b5cf6;
    --green:#00ff95;
    --dark:#020617;
    --glass:rgba(255,255,255,0.06);
}

body{

    min-height:100vh;

    overflow:hidden;

    font-family:"Inter",sans-serif;

    background:
    radial-gradient(circle at top left,#0f172a,#020617 55%,#000);

    position:relative;

    display:flex;

    align-items:center;

    justify-content:center;

    color:white;
}

/* ==================================================
BACKGROUND
================================================== */

.bg-wrapper{

    position:absolute;

    inset:0;

    overflow:hidden;
}

/* animated mesh */

.mesh{

    position:absolute;

    width:180%;
    height:180%;

    background:
    radial-gradient(circle at 15% 20%, rgba(0,255,229,0.18), transparent 18%),
    radial-gradient(circle at 85% 30%, rgba(59,130,246,0.16), transparent 22%),
    radial-gradient(circle at 70% 80%, rgba(139,92,246,0.16), transparent 20%),
    radial-gradient(circle at 30% 70%, rgba(0,255,149,0.10), transparent 20%);

    animation:
    meshMove 22s linear infinite;
}

@keyframes meshMove{

    0%{
        transform:
        translate(0px,0px)
        rotate(0deg);
    }

    50%{
        transform:
        translate(-60px,-35px)
        rotate(180deg);
    }

    100%{
        transform:
        translate(0px,0px)
        rotate(360deg);
    }
}

/* grid */

.grid{

    position:absolute;

    inset:0;

    background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);

    background-size:55px 55px;

    mask-image:
    radial-gradient(circle at center,black 35%,transparent 90%);

    animation:
    gridMove 18s linear infinite;
}

@keyframes gridMove{

    from{
        transform:translateY(0px);
    }

    to{
        transform:translateY(55px);
    }
}

/* aurora */

.aurora{

    position:absolute;

    width:600px;
    height:600px;

    border-radius:50%;

    filter:blur(90px);

    opacity:0.18;
}

.aurora1{

    background:#00ffe5;

    top:-220px;
    left:-120px;

    animation:auroraFloat 8s ease-in-out infinite;
}

.aurora2{

    background:#8b5cf6;

    bottom:-250px;
    right:-150px;

    animation:auroraFloat 10s ease-in-out infinite reverse;
}

.aurora3{

    background:#2563eb;

    top:40%;
    left:50%;

    transform:translate(-50%,-50%);

    width:450px;
    height:450px;

    opacity:0.12;

    animation:auroraPulse 6s ease-in-out infinite;
}

@keyframes auroraFloat{

    0%,100%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-35px);
    }
}

@keyframes auroraPulse{

    0%,100%{
        transform:translate(-50%,-50%) scale(1);
    }

    50%{
        transform:translate(-50%,-50%) scale(1.08);
    }
}

/* floating particles */

.particle{

    position:absolute;

    border-radius:50%;

    background:white;

    opacity:0.16;

    animation:
    particleFloat linear infinite;
}

.particle:nth-child(1){

    width:5px;
    height:5px;

    left:10%;

    animation-duration:14s;
}

.particle:nth-child(2){

    width:7px;
    height:7px;

    left:28%;

    animation-duration:18s;
}

.particle:nth-child(3){

    width:4px;
    height:4px;

    left:45%;

    animation-duration:13s;
}

.particle:nth-child(4){

    width:8px;
    height:8px;

    left:62%;

    animation-duration:17s;
}

.particle:nth-child(5){

    width:5px;
    height:5px;

    left:82%;

    animation-duration:16s;
}

@keyframes particleFloat{

    from{

        transform:
        translateY(110vh)
        scale(0);
    }

    to{

        transform:
        translateY(-10vh)
        scale(1.5);
    }
}

/* animated lines */

.line{

    position:absolute;

    height:1px;

    width:100%;

    background:
    linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,0.22),
        transparent
    );

    animation:
    lineMove 9s linear infinite;
}

.line1{
    top:18%;
}

.line2{
    top:48%;
    animation-delay:2s;
}

.line3{
    top:78%;
    animation-delay:4s;
}

@keyframes lineMove{

    0%{
        transform:translateX(-100%);
    }

    100%{
        transform:translateX(100%);
    }
}

/* ==================================================
LOGIN CONTAINER
================================================== */

.login-container{

    width:100%;

    display:flex;

    justify-content:center;

    align-items:center;

    padding:25px;

    position:relative;

    z-index:5;
}

.login-card{

    width:100%;
    max-width:560px;

    position:relative;

    overflow:hidden;

    border-radius:42px;

    padding:48px 40px;

    background:
    linear-gradient(
        145deg,
        rgba(15,23,42,0.82),
        rgba(3,7,18,0.90)
    );

    border:
    1px solid rgba(255,255,255,0.08);

    backdrop-filter:blur(30px);

    box-shadow:
    0 25px 80px rgba(0,0,0,0.65),
    inset 0 1px 0 rgba(255,255,255,0.08);

    animation:
    cardReveal 1s ease;
}

@keyframes cardReveal{

    from{

        opacity:0;

        transform:
        translateY(70px)
        scale(0.9);
    }

    to{

        opacity:1;

        transform:
        translateY(0px)
        scale(1);
    }
}

/* animated glow border */

.login-card::before{

    content:"";

    position:absolute;

    inset:0;

    border-radius:42px;

    padding:1.3px;

    background:
    linear-gradient(
        135deg,
        rgba(0,255,229,0.8),
        rgba(59,130,246,0.7),
        rgba(139,92,246,0.7),
        rgba(0,255,149,0.8)
    );

    -webkit-mask:
    linear-gradient(#fff 0 0) content-box,
    linear-gradient(#fff 0 0);

    -webkit-mask-composite:xor;

    mask-composite:exclude;

    animation:
    borderRotate 8s linear infinite;
}

@keyframes borderRotate{

    0%{
        filter:hue-rotate(0deg);
    }

    100%{
        filter:hue-rotate(360deg);
    }
}

/* top shine */

.top-shine{

    position:absolute;

    top:0;
    left:-100%;

    width:100%;
    height:3px;

    background:
    linear-gradient(
        90deg,
        transparent,
        white,
        transparent
    );

    animation:
    shineMove 5s linear infinite;
}

@keyframes shineMove{

    100%{
        left:120%;
    }
}

/* ==================================================
LOGO
================================================== */

.logo-wrapper{

    display:flex;

    justify-content:center;

    margin-bottom:30px;
}

.logo{

    width:110px;
    height:110px;

    border-radius:32px;

    position:relative;

    background:
    linear-gradient(
        135deg,
        #00ffe5,
        #2563eb,
        #8b5cf6
    );

    display:flex;

    align-items:center;

    justify-content:center;

    box-shadow:
    0 18px 45px rgba(0,255,229,0.22);

    animation:
    logoFloat 5s ease-in-out infinite;
}

.logo::before{

    content:"";

    position:absolute;

    inset:-10px;

    border-radius:40px;

    border:
    1px solid rgba(255,255,255,0.10);

    animation:
    spin 10s linear infinite;
}

.logo::after{

    content:"";

    position:absolute;

    inset:-18px;

    border-radius:45px;

    border:
    1px dashed rgba(255,255,255,0.08);

    animation:
    spinReverse 14s linear infinite;
}

.logo i{

    font-size:50px;

    color:#02131f;
}

@keyframes logoFloat{

    0%,100%{

        transform:
        translateY(0px);
    }

    50%{

        transform:
        translateY(-12px);
    }
}

@keyframes spin{

    100%{
        transform:rotate(360deg);
    }
}

@keyframes spinReverse{

    100%{
        transform:rotate(-360deg);
    }
}

/* ==================================================
TEXT
================================================== */

.title{

    text-align:center;

    font-size:48px;

    font-weight:900;

    line-height:1.1;

    background:
    linear-gradient(
        90deg,
        #ffffff,
        #00ffe5,
        #8b5cf6
    );

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;

    margin-bottom:14px;
}

.subtitle{

    text-align:center;

    color:#9ca3af;

    font-size:15px;

    line-height:1.8;

    margin-bottom:38px;
}

/* ==================================================
INPUTS
================================================== */

.input-box{

    position:relative;

    margin-bottom:24px;
}

.input-box input{

    width:100%;

    height:68px;

    border:none;

    outline:none;

    border-radius:22px;

    background:
    rgba(255,255,255,0.05);

    border:
    1px solid rgba(255,255,255,0.08);

    padding-left:68px;

    padding-right:20px;

    color:white;

    font-size:16px;

    transition:0.35s;
}

.input-box input:focus{

    background:
    rgba(255,255,255,0.08);

    border-color:#00ffe5;

    box-shadow:
    0 0 30px rgba(0,255,229,0.16);

    transform:
    translateY(-2px);
}

.input-box i{

    position:absolute;

    top:50%;
    left:25px;

    transform:translateY(-50%);

    color:#00ffe5;

    font-size:20px;
}

.input-box input::placeholder{

    color:#94a3b8;
}

/* glow effect */

.input-box::after{

    content:"";

    position:absolute;

    inset:0;

    border-radius:22px;

    background:
    linear-gradient(
        135deg,
        rgba(0,255,229,0.12),
        transparent,
        rgba(139,92,246,0.12)
    );

    opacity:0;

    transition:0.35s;

    pointer-events:none;
}

.input-box:focus-within::after{

    opacity:1;
}

/* ==================================================
BUTTONS
================================================== */

.main-btn{

    width:100%;

    height:66px;

    border:none;

    border-radius:22px;

    position:relative;

    overflow:hidden;

    font-size:17px;

    font-weight:800;

    transition:0.35s;
}

.login-btn{

    margin-top:10px;

    background:
    linear-gradient(
        135deg,
        #00ffe5,
        #2563eb
    );

    color:white;

    box-shadow:
    0 16px 40px rgba(37,99,235,0.35);
}

.login-btn:hover{

    transform:
    translateY(-5px)
    scale(1.01);

    box-shadow:
    0 22px 50px rgba(37,99,235,0.45);
}

.signup-btn{

    margin-top:18px;

    background:
    rgba(255,255,255,0.05);

    border:
    1px solid rgba(255,255,255,0.08);

    color:white;
}

.signup-btn:hover{

    background:
    rgba(255,255,255,0.10);

    transform:
    translateY(-5px);
}

.main-btn::before{

    content:"";

    position:absolute;

    top:0;
    left:-120%;

    width:60%;
    height:100%;

    background:
    linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,0.35),
        transparent
    );

    transform:skewX(-25deg);

    transition:0.9s;
}

.main-btn:hover::before{

    left:140%;
}

/* ==================================================
LINKS
================================================== */

.links{

    margin-top:30px;

    display:flex;

    justify-content:center;

    gap:28px;

    flex-wrap:wrap;
}

.links a{

    color:#9bdcff;

    text-decoration:none;

    font-size:14px;

    font-weight:600;

    position:relative;

    transition:0.3s;
}

.links a::after{

    content:"";

    position:absolute;

    left:0;
    bottom:-4px;

    width:0%;

    height:2px;

    background:#00ffe5;

    transition:0.3s;
}

.links a:hover{

    color:#00ffe5;

    transform:translateY(-2px);
}

.links a:hover::after{

    width:100%;
}

/* ==================================================
BOTTOM
================================================== */

.bottom-box{

    margin-top:34px;

    text-align:center;
}

.security-badges{

    display:flex;

    justify-content:center;

    gap:12px;

    flex-wrap:wrap;

    margin-bottom:16px;
}

.badge-chip{

    padding:10px 16px;

    border-radius:999px;

    background:
    rgba(255,255,255,0.05);

    border:
    1px solid rgba(255,255,255,0.08);

    font-size:12px;

    color:#d1d5db;

    backdrop-filter:blur(10px);
}

.bottom-text{

    color:#6b7280;

    font-size:13px;

    letter-spacing:1px;

    line-height:1.8;
}

/* ==================================================
AUTOFILL FIX
================================================== */

input:-webkit-autofill,
input:-webkit-autofill:hover,
input:-webkit-autofill:focus,
input:-webkit-autofill:active {

    -webkit-box-shadow:
    0 0 0px 1000px #0f172a inset !important;

    -webkit-text-fill-color:white !important;

    transition:
    background-color 9999s ease-in-out 0s;
}

/* ==================================================
RESPONSIVE
================================================== */

@media(max-width:768px){

    body{

        overflow-y:auto;
    }

    .login-card{

        padding:40px 24px;

        border-radius:32px;
    }

    .title{

        font-size:36px;
    }

    .subtitle{

        font-size:14px;
    }

    .logo{

        width:90px;
        height:90px;
    }

    .logo i{

        font-size:40px;
    }

    .main-btn{

        height:60px;
    }

    .input-box input{

        height:62px;

        font-size:15px;
    }

    .links{

        gap:18px;
    }
}

</style>

</head>

<body>

<!-- BACKGROUND -->

<div class="bg-wrapper">

<div class="mesh"></div>

<div class="grid"></div>

<div class="aurora aurora1"></div>
<div class="aurora aurora2"></div>
<div class="aurora aurora3"></div>

<div class="line line1"></div>
<div class="line line2"></div>
<div class="line line3"></div>

<div class="particle"></div>
<div class="particle"></div>
<div class="particle"></div>
<div class="particle"></div>
<div class="particle"></div>

</div>

<!-- LOGIN -->

<div class="login-container">

<div class="login-card">

<div class="top-shine"></div>

<!-- LOGO -->

<div class="logo-wrapper">

<div class="logo">

<i class="fa-solid fa-wallet"></i>

</div>

</div>

<!-- TITLE -->

<h1 class="title">

Expense Tracker

</h1>

<p class="subtitle">

Secure smart finance management system with futuristic premium experience,
AI powered analytics and protected cloud access.

</p>

<!-- FORM -->

<form
method="POST"
action="/"
>

<div class="input-box">

<i class="fa-solid fa-user"></i>

<input
type="text"
name="username"
placeholder="Enter your username"
required
>

</div>

<div class="input-box">

<i class="fa-solid fa-lock"></i>

<input
type="password"
name="password"
placeholder="Enter your password"
required
>

</div>

<button
type="submit"
class="main-btn login-btn"
>

Login Securely

</button>

</form>

<!-- SIGNUP -->

<a
href="/signup"
style="text-decoration:none;"
>

<button
class="main-btn signup-btn"
>

Create New Account

</button>

</a>

<!-- LINKS -->

<div class="links">

<a href="/forgot_password">

Forgot Password

</a>

<a href="/forgot_username">

Forgot Username

</a>

</div>

<!-- BOTTOM -->

<div class="bottom-box">

<div class="security-badges">

<div class="badge-chip">

<i class="fa-solid fa-shield-halved me-1"></i>
Secure Authentication

</div>

<div class="badge-chip">

<i class="fa-solid fa-bolt me-1"></i>
Dynamic UI

</div>

<div class="badge-chip">

<i class="fa-solid fa-chart-line me-1"></i>
Smart Finance

</div>

</div>

<div class="bottom-text">

Protected Authentication • Premium Experience • Advanced Expense System

</div>

</div>

</div>

</div>

</body>

</html>
