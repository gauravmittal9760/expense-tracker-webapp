<!DOCTYPE html>
<html>

<head>

    <title>
        Date Range PDF
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    >

    <style>

        body {

            min-height: 100vh;

            background:
                radial-gradient(circle at top left, #16222A 0%, #0f2027 45%, #020406 100%);

            overflow: hidden;

            position: relative;

            color: white;

        }

        .bg-glow {

            position: absolute;

            width: 340px;

            height: 340px;

            border-radius: 50%;

            filter: blur(120px);

            opacity: 0.22;

            z-index: 0;

        }

        .glow1 {

            background: #00c6ff;

            top: -120px;

            left: -100px;

        }

        .glow2 {

            background: #00ffb3;

            bottom: -130px;

            right: -100px;

        }

        .pdf-card {

            position: relative;

            z-index: 2;

            background: rgba(17, 25, 40, 0.92);

            backdrop-filter: blur(22px);

            border-radius: 34px;

            border: 1px solid rgba(255,255,255,0.08);

            overflow: hidden;

            box-shadow:
                0 0 50px rgba(0,0,0,0.55),
                0 0 30px rgba(0,198,255,0.14);

        }

        .pdf-card::before {

            content: "";

            position: absolute;

            top: 0;

            left: 0;

            width: 100%;

            height: 5px;

            background: linear-gradient(
                90deg,
                #00c6ff,
                #00ffb3,
                #0d6efd
            );

        }

        .title {

            font-size: 40px;

            font-weight: 800;

            background: linear-gradient(
                90deg,
                #ffffff,
                #9be8ff,
                #b7ffe9
            );

            -webkit-background-clip: text;

            -webkit-text-fill-color: transparent;

            letter-spacing: 0.5px;

        }

        .subtitle {

            color: #c7d2e0;

            font-size: 15px;

            line-height: 1.8;

            margin-top: 14px;

        }

        .icon-box {

            width: 110px;

            height: 110px;

            border-radius: 50%;

            background: linear-gradient(
                135deg,
                rgba(0,198,255,0.20),
                rgba(0,255,179,0.20)
            );

            display: flex;

            align-items: center;

            justify-content: center;

            margin: 0 auto 30px auto;

            font-size: 44px;

            color: white;

            box-shadow:
                0 0 30px rgba(0,255,179,0.18);

        }

        .form-section {

            margin-top: 35px;

            background: rgba(255,255,255,0.03);

            border: 1px solid rgba(255,255,255,0.06);

            border-radius: 26px;

            padding: 30px;

        }

        .form-label {

            font-weight: 600;

            color: #e8eef8;

            margin-bottom: 10px;

            font-size: 15px;

        }

        .form-control {

            background: #161d2e !important;

            border: 1px solid rgba(255,255,255,0.10) !important;

            border-radius: 16px;

            color: white !important;

            padding: 15px;

            font-size: 16px;

            box-shadow: none !important;

            transition: 0.3s ease;

        }

        .form-control:focus {

            border-color: #00ffb3 !important;

            box-shadow:
                0 0 0 0.20rem rgba(0,255,179,0.18) !important;

        }

        input[type="date"]::-webkit-calendar-picker-indicator {

            filter: invert(1);

            cursor: pointer;

        }

        .info-box {

            margin-top: 24px;

            background: linear-gradient(
                135deg,
                rgba(0,198,255,0.10),
                rgba(0,255,179,0.08)
            );

            border: 1px solid rgba(255,255,255,0.08);

            border-radius: 18px;

            padding: 18px;

            color: #d5e1ef;

            font-size: 15px;

            line-height: 1.7;

        }

        .generate-btn {

            margin-top: 28px;

            background: linear-gradient(
                135deg,
                #00c6ff,
                #00ffb3
            );

            border: none;

            border-radius: 16px;

            padding: 15px;

            font-size: 17px;

            font-weight: 700;

            color: #081018;

            transition: 0.3s ease;

        }

        .generate-btn:hover {

            transform: translateY(-3px);

            box-shadow:
                0 12px 28px rgba(0,255,179,0.28);

        }

        /* FIX AUTOFILL WHITE BACKGROUND ISSUE */
input:-webkit-autofill,
input:-webkit-autofill:hover,
input:-webkit-autofill:focus,
input:-webkit-autofill:active {
    -webkit-box-shadow: 0 0 0px 1000px #111827 inset !important;
    -webkit-text-fill-color: white !important;
    caret-color: white;
    transition: background-color 9999s ease-in-out 0s;
}

    </style>

</head>

<body>

<div class="bg-glow glow1"></div>
<div class="bg-glow glow2"></div>

<div class="container d-flex align-items-center justify-content-center min-vh-100">

    <div class="row justify-content-center w-100">

        <div class="col-lg-5 col-md-7">

            <div class="pdf-card p-4 p-md-5">

                <!-- ICON -->

                <div class="icon-box">

                    <i class="fa-solid fa-file-pdf"></i>

                </div>

                <!-- TITLE -->

                <div class="text-center">

                    <h1 class="title">

                        Date Range PDF

                    </h1>

                    <p class="subtitle">

                        Export professional PDF reports for a custom date range and keep your expense history organized beautifully.

                    </p>

                </div>

                <!-- FORM -->

                <div class="form-section">

                    <form
                        method="POST"
                        action="/generate_date_pdf"
                    >

                        <!-- START DATE -->

                        <div class="mb-4">

                            <label class="form-label">

                                <i class="fa-solid fa-calendar-days me-2"></i>

                                Start Date

                            </label>

                            <input
                                type="date"
                                name="start_date"
                                class="form-control"
                                required
                            >

                        </div>

                        <!-- END DATE -->

                        <div class="mb-3">

                            <label class="form-label">

                                <i class="fa-solid fa-calendar-check me-2"></i>

                                End Date

                            </label>

                            <input
                                type="date"
                                name="end_date"
                                class="form-control"
                                required
                            >

                        </div>

                        <!-- INFO -->

                        <div class="info-box">

                            📄 Your exported PDF will include all expenses recorded between the selected dates in a clean printable format.

                        </div>

                        <!-- BUTTON -->

                        <button
                            type="submit"
                            class="btn generate-btn w-100"
                        >

                            <i class="fa-solid fa-download me-2"></i>

                            Generate PDF

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
