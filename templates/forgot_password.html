<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Forgot Password
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    >

    <style>

        * {

            margin: 0;
            padding: 0;
            box-sizing: border-box;

        }

        body {

            min-height: 100vh;
            background:
                radial-gradient(circle at top left, #1e3a8a 0%, transparent 25%),
                radial-gradient(circle at bottom right, #7c3aed 0%, transparent 25%),
                linear-gradient(135deg, #0f172a, #111827, #020617);

            overflow-x: hidden;
            color: white;
            font-family: "Segoe UI", sans-serif;

        }

        .bg-blur {

            position: absolute;
            width: 350px;
            height: 350px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.35;
            z-index: 0;

        }

        .blur-1 {

            background: #2563eb;
            top: -100px;
            left: -80px;

        }

        .blur-2 {

            background: #9333ea;
            bottom: -120px;
            right: -80px;

        }

        .main-wrapper {

            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 15px;
            position: relative;
            z-index: 2;

        }

        .forgot-card {

            width: 100%;
            max-width: 720px;

            background: rgba(15, 23, 42, 0.75);

            border: 1px solid rgba(255,255,255,0.08);

            backdrop-filter: blur(18px);

            border-radius: 28px;

            padding: 45px;

            box-shadow:
                0 0 40px rgba(0,0,0,0.45),
                0 0 80px rgba(59,130,246,0.08);

        }

        .main-title {

            text-align: center;
            font-size: 42px;
            font-weight: 800;
            margin-bottom: 10px;

            background: linear-gradient(
                to right,
                #ffffff,
                #93c5fd,
                #c4b5fd
            );

            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

        }

        .sub-title {

            text-align: center;
            color: #cbd5e1;
            margin-bottom: 40px;
            font-size: 15px;

        }

        .section-box {

            background: rgba(255,255,255,0.04);

            border: 1px solid rgba(255,255,255,0.08);

            border-radius: 22px;

            padding: 28px;
            margin-bottom: 30px;

            transition: 0.3s;

        }

        .section-box:hover {

            transform: translateY(-3px);

            border-color: rgba(96,165,250,0.3);

            box-shadow:
                0 0 25px rgba(59,130,246,0.08);

        }

        .section-title {

            display: flex;
            align-items: center;
            gap: 12px;

            font-size: 24px;
            font-weight: 700;

            margin-bottom: 25px;

        }

        .section-title i {

            color: #60a5fa;

        }

        .form-control {

            background: rgba(255,255,255,0.07) !important;

            border: 1px solid rgba(255,255,255,0.08) !important;

            color: white !important;

            border-radius: 14px;

            padding: 14px 18px;

            height: 55px;

            font-size: 15px;

            margin-bottom: 18px;

        }

        .form-control::placeholder {

            color: #cbd5e1;

        }

        .form-control:focus {

            box-shadow:
                0 0 0 4px rgba(59,130,246,0.18) !important;

            border-color: #60a5fa !important;

            background: rgba(255,255,255,0.09) !important;

        }

        .btn-custom {

            width: 100%;
            border: none;
            border-radius: 14px;

            padding: 14px;

            font-size: 16px;
            font-weight: 700;

            transition: 0.3s;

        }

        .btn-custom:hover {

            transform: translateY(-2px);

        }

        .btn-otp {

            background: linear-gradient(
                135deg,
                #ef4444,
                #dc2626
            );

            color: white;

            box-shadow:
                0 10px 25px rgba(239,68,68,0.25);

        }

        .btn-security {

            background: linear-gradient(
                135deg,
                #f59e0b,
                #d97706
            );

            color: white;

            box-shadow:
                0 10px 25px rgba(245,158,11,0.22);

        }

        .divider {

            height: 1px;
            background:
                linear-gradient(
                    to right,
                    transparent,
                    rgba(255,255,255,0.15),
                    transparent
                );

            margin: 35px 0;

        }

        .alert {

            border-radius: 14px;
            border: none;
            font-weight: 600;

        }

        .back-btn {

            width: 100%;

            border-radius: 14px;

            padding: 13px;

            font-weight: 700;

            border: 1px solid rgba(255,255,255,0.18);

            color: white;

            background: transparent;

            transition: 0.3s;

            text-decoration: none;
            display: inline-block;
            text-align: center;

        }

        .back-btn:hover {

            background: rgba(255,255,255,0.08);

            color: white;

            transform: translateY(-2px);

        }

        @media(max-width:768px) {

            .forgot-card {

                padding: 30px 22px;

            }

            .main-title {

                font-size: 34px;

            }

            .section-title {

                font-size: 20px;

            }

        }

        /* FIX AUTOFILL WHITE BACKGROUND ISSUE */
input:-webkit-autofill,
input:-webkit-autofill:hover,
input:-webkit-autofill:focus,
input:-webkit-autofill:active {
    -webkit-box-shadow: 0 0 0px 1000px #111827 inset !important;
    -webkit-text-fill-color: white !important;
    caret-color: white;
    transition: background-color 9999s ease-in-out 0s;
}

    </style>

</head>

<body>

    <div class="bg-blur blur-1"></div>

    <div class="bg-blur blur-2"></div>

    <div class="main-wrapper">

        <div class="forgot-card">

            <h1 class="main-title">
                Password Recovery
            </h1>

            <p class="sub-title">
                Recover your account securely using OTP or security question
            </p>

            {% with messages = get_flashed_messages() %}

                {% if messages %}

                    {% for msg in messages %}

                        <div class="alert alert-warning">

                            {{ msg }}

                        </div>

                    {% endfor %}

                {% endif %}

            {% endwith %}

            <!-- EMAIL OTP SECTION -->

            <div class="section-box">

                <div class="section-title">

                    <i class="fa-solid fa-envelope-circle-check"></i>

                    <span>
                        Recover Through Email OTP
                    </span>

                </div>

                <form
                    method="POST"
                    action="/forgot_password"
                >

                    <input
                        type="text"
                        name="username"
                        class="form-control"
                        placeholder="Enter Username"
                        required
                    >

                    <input
                        type="email"
                        name="email"
                        class="form-control"
                        placeholder="Enter Registered Email"
                        required
                    >

                    <button
                        class="btn-custom btn-otp"
                    >

                        <i class="fa-solid fa-paper-plane me-2"></i>

                        Send OTP

                    </button>

                </form>

            </div>

            <div class="divider"></div>

            <!-- SECURITY QUESTION SECTION -->

            <div class="section-box">

                <div class="section-title">

                    <i class="fa-solid fa-shield-halved"></i>

                    <span>
                        Recover Through Security Question
                    </span>

                </div>

                <form
                    method="POST"
                    action="/security_question_search"
                >

                    <input
                        type="text"
                        name="username"
                        class="form-control"
                        placeholder="Enter Username"
                        required
                    >

                    <button
                        class="btn-custom btn-security"
                    >

                        <i class="fa-solid fa-arrow-right me-2"></i>

                        Continue

                    </button>

                </form>

            </div>

            <!-- BACK BUTTON -->

            <a
                href="/"
                class="back-btn"
            >

                <i class="fa-solid fa-arrow-left me-2"></i>

                Back To Login

            </a>

        </div>

    </div>

</body>

</html>
