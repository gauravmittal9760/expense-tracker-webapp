<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Split Expenses
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    >

    <style>

        *{

            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            min-height:100vh;

            background:
                radial-gradient(circle at top left,#2563eb22 0%,transparent 30%),
                radial-gradient(circle at bottom right,#9333ea22 0%,transparent 30%),
                linear-gradient(135deg,#0f172a,#111827,#1e293b);

            color:white;

            overflow-x:hidden;
        }

        body::before{

            content:"";

            position:fixed;

            width:420px;
            height:420px;

            background:rgba(59,130,246,0.08);

            border-radius:50%;

            top:-180px;
            left:-120px;

            filter:blur(40px);

            z-index:0;
        }

        body::after{

            content:"";

            position:fixed;

            width:380px;
            height:380px;

            background:rgba(168,85,247,0.08);

            border-radius:50%;

            bottom:-150px;
            right:-100px;

            filter:blur(40px);

            z-index:0;
        }

        .main-wrapper{

            position:relative;
            z-index:2;

            min-height:100vh;

            display:flex;
            align-items:center;
            justify-content:center;

            padding:40px 15px;
        }

        .split-card{

            width:100%;
            max-width:560px;

            background:rgba(17,24,39,0.78);

            backdrop-filter:blur(18px);

            border:1px solid rgba(255,255,255,0.08);

            border-radius:30px;

            padding:40px 35px;

            box-shadow:
                0 12px 40px rgba(0,0,0,0.5),
                inset 0 1px 0 rgba(255,255,255,0.04);

            animation:fadeUp 0.7s ease;
        }

        @keyframes fadeUp{

            from{

                opacity:0;
                transform:translateY(30px);
            }

            to{

                opacity:1;
                transform:translateY(0);
            }
        }

        .top-icon{

            width:90px;
            height:90px;

            border-radius:25px;

            margin:auto;

            display:flex;
            align-items:center;
            justify-content:center;

            font-size:2.5rem;

            background:
                linear-gradient(135deg,#3b82f6,#9333ea);

            box-shadow:
                0 0 30px rgba(59,130,246,0.45);

            margin-bottom:25px;
        }

        .main-title{

            text-align:center;

            font-size:2.4rem;
            font-weight:800;

            margin-bottom:10px;

            background:
                linear-gradient(90deg,#ffffff,#93c5fd,#c4b5fd);

            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
        }

        .sub-title{

            text-align:center;

            color:#cbd5e1;

            margin-bottom:35px;

            font-size:1rem;
        }

        .form-label{

            font-weight:600;

            color:#e2e8f0;

            margin-bottom:10px;
        }

        .input-group{

            background:rgba(255,255,255,0.04);

            border:1px solid rgba(255,255,255,0.08);

            border-radius:18px;

            overflow:hidden;

            margin-bottom:24px;

            transition:0.3s ease;
        }

        .input-group:focus-within{

            border-color:#60a5fa;

            box-shadow:0 0 20px rgba(96,165,250,0.2);
        }

        .input-group-text{

            background:transparent;
            border:none;

            color:#93c5fd;

            font-size:1.1rem;

            padding-left:18px;
        }

        .form-control{

            background:transparent !important;

            border:none !important;

            color:white !important;

            padding:16px 14px;

            font-size:1rem;

            box-shadow:none !important;
        }

        .form-control::placeholder{

            color:#94a3b8;
        }

        .split-btn{

            border:none;

            width:100%;

            padding:16px;

            border-radius:18px;

            font-size:1.05rem;
            font-weight:700;

            color:white;

            background:
                linear-gradient(135deg,#2563eb,#9333ea);

            transition:0.35s ease;

            box-shadow:
                0 10px 25px rgba(59,130,246,0.35);
        }

        .split-btn:hover{

            transform:translateY(-3px) scale(1.01);

            box-shadow:
                0 14px 35px rgba(59,130,246,0.45);
        }

        .result-card{

            margin-top:28px;

            background:
                linear-gradient(135deg,
                rgba(34,197,94,0.15),
                rgba(16,185,129,0.1));

            border:1px solid rgba(34,197,94,0.25);

            border-radius:22px;

            padding:28px;

            text-align:center;

            animation:fadeUp 0.5s ease;
        }

        .result-card h5{

            color:#bbf7d0;

            margin-bottom:12px;

            font-weight:600;
        }

        .result-amount{

            font-size:2.3rem;
            font-weight:800;

            color:#4ade80;

            text-shadow:0 0 15px rgba(74,222,128,0.35);
        }

        .back-btn{

            margin-top:25px;

            width:100%;

            padding:14px;

            border-radius:16px;

            text-decoration:none;

            display:flex;
            align-items:center;
            justify-content:center;
            gap:10px;

            font-weight:700;

            background:rgba(255,255,255,0.06);

            border:1px solid rgba(255,255,255,0.08);

            color:white;

            transition:0.3s ease;
        }

        .back-btn:hover{

            background:rgba(255,255,255,0.12);

            color:white;

            transform:translateY(-2px);
        }

        .floating-stats{

            display:flex;
            justify-content:space-between;
            gap:15px;

            margin-bottom:28px;
        }

        .stat-box{

            flex:1;

            background:rgba(255,255,255,0.04);

            border:1px solid rgba(255,255,255,0.06);

            border-radius:18px;

            padding:16px;

            text-align:center;
        }

        .stat-box i{

            color:#93c5fd;

            margin-bottom:8px;

            font-size:1.2rem;
        }

        .stat-box p{

            margin:0;

            color:#cbd5e1;

            font-size:0.88rem;
        }

        @media(max-width:576px){

            .split-card{

                padding:30px 22px;
            }

            .main-title{

                font-size:2rem;
            }

            .floating-stats{

                flex-direction:column;
            }

            .result-amount{

                font-size:1.9rem;
            }
        }

         /* FIX AUTOFILL WHITE BACKGROUND ISSUE */
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus,
    input:-webkit-autofill:active {
        -webkit-box-shadow: 0 0 0px 1000px #111827 inset !important;
        -webkit-text-fill-color: white !important;
        caret-color: white;
        transition: background-color 9999s ease-in-out 0s;
    }

    </style>

</head>

<body>

<div class="main-wrapper">

    <div class="split-card">

        <div class="top-icon">

            <i class="fa-solid fa-users"></i>

        </div>

        <h1 class="main-title">

            Split Expenses

        </h1>

        <p class="sub-title">

            Instantly calculate how much each person needs to pay.
        </p>

        <div class="floating-stats">

            <div class="stat-box">

                <i class="fa-solid fa-money-bill-wave"></i>

                <p>
                    Smart Calculation
                </p>

            </div>

            <div class="stat-box">

                <i class="fa-solid fa-user-group"></i>

                <p>
                    Group Splitting
                </p>

            </div>

            <div class="stat-box">

                <i class="fa-solid fa-bolt"></i>

                <p>
                    Instant Result
                </p>

            </div>

        </div>

        <form method="POST">

            <!-- Total Amount -->

            <label class="form-label">

                Total Amount

            </label>

            <div class="input-group">

                <span class="input-group-text">

                    <i class="fa-solid fa-indian-rupee-sign"></i>

                </span>

                <input
                    type="number"
                    name="amount"
                    class="form-control"
                    placeholder="Enter total expense amount"
                    required
                >

            </div>

            <!-- Number of People -->

            <label class="form-label">

                Number of People

            </label>

            <div class="input-group">

                <span class="input-group-text">

                    <i class="fa-solid fa-users"></i>

                </span>

                <input
                    type="number"
                    name="people"
                    class="form-control"
                    placeholder="Enter number of people"
                    required
                >

            </div>

            <!-- Button -->

            <button
                type="submit"
                class="split-btn"
            >

                <i class="fa-solid fa-calculator"></i>

                Split Now

            </button>

        </form>

        <!-- Result -->

        {% if result %}

        <div class="result-card">

            <h5>

                💸 Each Person Pays

            </h5>

            <div class="result-amount">

                ₹ {{ result }}

            </div>

        </div>

        {% endif %}

        <!-- Back -->

        <a
            href="/money_budget"
            class="back-btn"
        >

            <i class="fa-solid fa-arrow-left"></i>

            Back

        </a>

    </div>

</div>

</body>

</html>
