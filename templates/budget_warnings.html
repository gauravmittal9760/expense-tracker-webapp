<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Budget Warnings
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    >

    <style>

        body {

            min-height: 100vh;
            background:
                radial-gradient(circle at top left, #1f2937 0%, #0f172a 45%, #020617 100%);
            color: white;
            overflow-x: hidden;

        }

        .glass-card {

            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.45);

        }

        .main-title {

            font-size: 48px;
            font-weight: 800;
            text-align: center;
            letter-spacing: 1px;

            background: linear-gradient(
                to right,
                #ffffff,
                #facc15,
                #fb7185
            );

            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

        }

        .subtitle {

            text-align: center;
            color: #d1d5db;
            margin-top: 10px;
            margin-bottom: 50px;
            font-size: 17px;

        }

        .stat-card {

            border-radius: 24px;
            padding: 30px;
            height: 100%;
            position: relative;
            overflow: hidden;
            transition: 0.35s ease;

        }

        .stat-card:hover {

            transform: translateY(-8px) scale(1.02);

        }

        .stat-card::before {

            content: "";
            position: absolute;
            width: 180px;
            height: 180px;
            border-radius: 50%;
            top: -70px;
            right: -70px;
            background: rgba(255,255,255,0.08);

        }

        .budget-card {

            background: linear-gradient(
                135deg,
                #2563eb,
                #1d4ed8
            );

        }

        .expense-card {

            background: linear-gradient(
                135deg,
                #dc2626,
                #991b1b
            );

        }

        .balance-card {

            background: linear-gradient(
                135deg,
                #059669,
                #047857
            );

        }

        .stat-icon {

            font-size: 38px;
            margin-bottom: 18px;

        }

        .stat-title {

            font-size: 18px;
            font-weight: 600;
            color: rgba(255,255,255,0.85);

        }

        .stat-value {

            font-size: 36px;
            font-weight: 800;
            margin-top: 12px;

        }

        .warning-box {

            border-radius: 24px;
            padding: 40px;
            margin-top: 35px;

            background: linear-gradient(
                135deg,
                rgba(250,204,21,0.18),
                rgba(251,146,60,0.14)
            );

            border: 1px solid rgba(255,255,255,0.12);

            backdrop-filter: blur(18px);

            box-shadow: 0 10px 35px rgba(0,0,0,0.35);

        }

        .warning-status {

            font-size: 34px;
            font-weight: 800;
            margin-bottom: 20px;
            color: #facc15;

        }

        .warning-text {

            font-size: 19px;
            line-height: 1.8;
            color: #f3f4f6;

        }

        .alert-icon {

            font-size: 70px;
            color: #facc15;
            margin-bottom: 25px;

            animation: pulse 2s infinite;

        }

        @keyframes pulse {

            0% {

                transform: scale(1);

            }

            50% {

                transform: scale(1.08);

            }

            100% {

                transform: scale(1);

            }

        }

        .back-btn {

            border-radius: 14px;
            font-size: 17px;
            font-weight: 700;
            padding: 14px;
            transition: 0.3s ease;

        }

        .back-btn:hover {

            transform: translateY(-3px);

        }

        .footer-note {

            text-align: center;
            color: #94a3b8;
            margin-top: 20px;
            font-size: 14px;

        }

        @media(max-width:768px) {

            .main-title {

                font-size: 34px;

            }

            .stat-value {

                font-size: 28px;

            }

            .warning-status {

                font-size: 26px;

            }

        }

    </style>

</head>

<body>

<div class="container py-5">

    <!-- HEADING -->

    <div class="mb-5">

        <h1 class="main-title">

            Budget Warnings ⚠️

        </h1>

        <p class="subtitle">

            Analyze your financial health and monitor spending limits smartly

        </p>

    </div>

    <!-- STATS -->

    <div class="row g-4">

        <!-- BUDGET -->

        <div class="col-lg-4 col-md-6">

            <div class="stat-card budget-card shadow-lg">

                <div class="stat-icon">

                    <i class="fa-solid fa-wallet"></i>

                </div>

                <div class="stat-title">

                    Monthly Budget

                </div>

                <div class="stat-value">

                    ₹{{ budget }}

                </div>

            </div>

        </div>

        <!-- TOTAL EXPENSE -->

        <div class="col-lg-4 col-md-6">

            <div class="stat-card expense-card shadow-lg">

                <div class="stat-icon">

                    <i class="fa-solid fa-money-bill-trend-up"></i>

                </div>

                <div class="stat-title">

                    Total Expenses

                </div>

                <div class="stat-value">

                    ₹{{ total_expense }}

                </div>

            </div>

        </div>

        <!-- REMAINING -->

        <div class="col-lg-4 col-md-12">

            <div class="stat-card balance-card shadow-lg">

                <div class="stat-icon">

                    <i class="fa-solid fa-piggy-bank"></i>

                </div>

                <div class="stat-title">

                    Remaining Balance

                </div>

                <div class="stat-value">

                    ₹{{ remaining }}

                </div>

            </div>

        </div>

    </div>

    <!-- WARNING SECTION -->

    <div class="warning-box mt-5 text-center">

        <div class="alert-icon">

            <i class="fa-solid fa-triangle-exclamation"></i>

        </div>

        <h2 class="warning-status">

            {{ status }}

        </h2>

        <p class="warning-text">

            {{ warning }}

        </p>

    </div>

    <!-- BACK BUTTON -->

    <div class="d-grid mt-5">

        <a
            href="/analytics_menu"
            class="btn btn-danger back-btn"
        >

            <i class="fa-solid fa-arrow-left me-2"></i>

            Back to Analytics

        </a>

    </div>

    <div class="footer-note">

        Smart budgeting helps maintain long-term financial stability 📈

    </div>

</div>

</body>

</html>
