<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Total Spending
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    >

    <style>

        *{

            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            min-height:100vh;

            background:
                radial-gradient(circle at top left,#ef444422 0%,transparent 30%),
                radial-gradient(circle at bottom right,#f9731622 0%,transparent 30%),
                linear-gradient(135deg,#0f172a,#111827,#1e293b);

            overflow:hidden;

            font-family:'Segoe UI',sans-serif;

            color:white;

            position:relative;
        }

        body::before{

            content:"";

            position:absolute;

            width:450px;
            height:450px;

            background:rgba(239,68,68,0.08);

            border-radius:50%;

            top:-180px;
            left:-120px;

            filter:blur(60px);
        }

        body::after{

            content:"";

            position:absolute;

            width:380px;
            height:380px;

            background:rgba(249,115,22,0.08);

            border-radius:50%;

            bottom:-150px;
            right:-100px;

            filter:blur(60px);
        }

        .main-wrapper{

            position:relative;
            z-index:2;

            min-height:100vh;

            display:flex;
            align-items:center;
            justify-content:center;

            padding:20px;
        }

        .spending-card{

            width:100%;
            max-width:650px;

            background:rgba(17,24,39,0.75);

            backdrop-filter:blur(18px);

            border:1px solid rgba(255,255,255,0.08);

            border-radius:35px;

            padding:50px 40px;

            text-align:center;

            box-shadow:
                0 15px 50px rgba(0,0,0,0.55),
                inset 0 1px 0 rgba(255,255,255,0.05);

            animation:fadeUp 0.7s ease;
        }

        @keyframes fadeUp{

            from{

                opacity:0;
                transform:translateY(40px);
            }

            to{

                opacity:1;
                transform:translateY(0);
            }
        }

        .top-icon{

            width:120px;
            height:120px;

            margin:auto;

            border-radius:30px;

            display:flex;
            align-items:center;
            justify-content:center;

            background:
                linear-gradient(135deg,#ef4444,#f97316);

            font-size:3rem;

            box-shadow:
                0 0 35px rgba(239,68,68,0.45);

            margin-bottom:30px;

            animation:floatIcon 3s ease-in-out infinite;
        }

        @keyframes floatIcon{

            0%{

                transform:translateY(0px);
            }

            50%{

                transform:translateY(-8px);
            }

            100%{

                transform:translateY(0px);
            }
        }

        .main-title{

            font-size:3rem;
            font-weight:800;

            margin-bottom:15px;

            background:
                linear-gradient(90deg,#ffffff,#fecaca,#fdba74);

            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
        }

        .sub-text{

            color:#cbd5e1;

            font-size:1.05rem;

            margin-bottom:40px;
        }

        .amount-box{

            background:
                linear-gradient(135deg,
                rgba(239,68,68,0.15),
                rgba(249,115,22,0.12));

            border:1px solid rgba(255,255,255,0.08);

            border-radius:28px;

            padding:35px 20px;

            margin-bottom:35px;

            position:relative;

            overflow:hidden;
        }

        .amount-box::before{

            content:"";

            position:absolute;

            width:200px;
            height:200px;

            background:rgba(255,255,255,0.03);

            border-radius:50%;

            top:-80px;
            right:-60px;
        }

        .amount-label{

            color:#fca5a5;

            font-size:1rem;

            margin-bottom:15px;

            letter-spacing:1px;

            text-transform:uppercase;
        }

        .amount-value{

            font-size:4rem;
            font-weight:900;

            color:#f87171;

            text-shadow:
                0 0 25px rgba(248,113,113,0.35);

            word-break:break-word;
        }

        .mini-stats{

            display:flex;
            gap:18px;

            margin-bottom:35px;
        }

        .stat-card{

            flex:1;

            background:rgba(255,255,255,0.04);

            border:1px solid rgba(255,255,255,0.06);

            border-radius:20px;

            padding:20px;
        }

        .stat-card i{

            font-size:1.4rem;

            color:#fca5a5;

            margin-bottom:12px;
        }

        .stat-card p{

            margin:0;

            color:#cbd5e1;

            font-size:0.92rem;
        }

        .back-btn{

            display:inline-flex;
            align-items:center;
            justify-content:center;
            gap:10px;

            width:100%;

            padding:16px;

            border-radius:18px;

            text-decoration:none;

            font-weight:700;
            font-size:1rem;

            background:
                linear-gradient(135deg,#ef4444,#dc2626);

            color:white;

            transition:0.35s ease;

            box-shadow:
                0 10px 25px rgba(239,68,68,0.35);
        }

        .back-btn:hover{

            transform:translateY(-3px);

            color:white;

            box-shadow:
                0 14px 35px rgba(239,68,68,0.45);
        }

        @media(max-width:768px){

            .spending-card{

                padding:35px 22px;
            }

            .main-title{

                font-size:2.2rem;
            }

            .amount-value{

                font-size:2.8rem;
            }

            .mini-stats{

                flex-direction:column;
            }

            .top-icon{

                width:95px;
                height:95px;

                font-size:2.4rem;
            }
        }

         /* FIX AUTOFILL WHITE BACKGROUND ISSUE */
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus,
    input:-webkit-autofill:active {
        -webkit-box-shadow: 0 0 0px 1000px #111827 inset !important;
        -webkit-text-fill-color: white !important;
        caret-color: white;
        transition: background-color 9999s ease-in-out 0s;
    }

    </style>

</head>

<body>

<div class="main-wrapper">

    <div class="spending-card">

        <!-- ICON -->

        <div class="top-icon">

            <i class="fa-solid fa-wallet"></i>

        </div>

        <!-- TITLE -->

        <h1 class="main-title">

            Total Spending

        </h1>

        <p class="sub-text">

            Track your complete expense activity and spending overview.
        </p>

        <!-- AMOUNT -->

        <div class="amount-box">

            <div class="amount-label">

                Overall Expenses

            </div>

            <div class="amount-value">

                ₹ {{ total }}

            </div>

        </div>

        <!-- MINI STATS -->

        <div class="mini-stats">

            <div class="stat-card">

                <i class="fa-solid fa-chart-line"></i>

                <p>
                    Spending Analytics
                </p>

            </div>

            <div class="stat-card">

                <i class="fa-solid fa-coins"></i>

                <p>
                    Expense Tracking
                </p>

            </div>

            <div class="stat-card">

                <i class="fa-solid fa-bolt"></i>

                <p>
                    Real-Time Overview
                </p>

            </div>

        </div>

        <!-- BACK BUTTON -->

        <a
            href="/money_budget"
            class="back-btn"
        >

            <i class="fa-solid fa-arrow-left"></i>

            Back

        </a>

    </div>

</div>

</body>

</html>
