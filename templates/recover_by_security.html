<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Recover Password
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com"
    >

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
    >

    <style>

        * {

            font-family: "Poppins", sans-serif;

        }

        body {

            min-height: 100vh;

            background:
                radial-gradient(circle at top left, rgba(251,191,36,0.18), transparent 30%),
                radial-gradient(circle at bottom right, rgba(139,92,246,0.18), transparent 30%),
                linear-gradient(135deg, #020617, #0f172a, #111827);

            display: flex;
            align-items: center;
            justify-content: center;

            overflow-x: hidden;

            position: relative;

            color: white;

        }

        body::before {

            content: "";

            position: absolute;

            width: 420px;
            height: 420px;

            background: rgba(251,191,36,0.12);

            border-radius: 50%;

            top: -120px;
            left: -100px;

            filter: blur(60px);

        }

        body::after {

            content: "";

            position: absolute;

            width: 380px;
            height: 380px;

            background: rgba(139,92,246,0.12);

            border-radius: 50%;

            bottom: -140px;
            right: -100px;

            filter: blur(60px);

        }

        .recover-card {

            position: relative;
            z-index: 5;

            width: 100%;
            max-width: 560px;

            background: rgba(15,23,42,0.88);

            border: 1px solid rgba(255,255,255,0.08);

            border-radius: 30px;

            padding: 42px;

            backdrop-filter: blur(18px);

            overflow: hidden;

            box-shadow:
                0 0 45px rgba(0,0,0,0.45),
                inset 0 0 0.5px rgba(255,255,255,0.18);

        }

        .recover-card::before {

            content: "";

            position: absolute;

            width: 220px;
            height: 220px;

            background: rgba(251,191,36,0.12);

            border-radius: 50%;

            top: -100px;
            right: -90px;

            filter: blur(30px);

        }

        .recover-card::after {

            content: "";

            position: absolute;

            width: 180px;
            height: 180px;

            background: rgba(139,92,246,0.12);

            border-radius: 50%;

            bottom: -80px;
            left: -60px;

            filter: blur(30px);

        }

        .content {

            position: relative;
            z-index: 2;

        }

        .icon-box {

            width: 95px;
            height: 95px;

            margin: auto;

            border-radius: 28px;

            background: linear-gradient(
                135deg,
                #f59e0b,
                #8b5cf6
            );

            display: flex;
            align-items: center;
            justify-content: center;

            font-size: 42px;

            box-shadow:
                0 18px 35px rgba(245,158,11,0.35);

        }

        .main-title {

            text-align: center;

            margin-top: 24px;

            font-size: 2.2rem;
            font-weight: 700;

            background: linear-gradient(
                90deg,
                #facc15,
                #fb7185,
                #a855f7
            );

            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

        }

        .subtitle {

            text-align: center;

            color: #cbd5e1;

            margin-top: 12px;

            margin-bottom: 34px;

            font-size: 15px;

        }

        .security-box {

            background: rgba(255,255,255,0.05);

            border: 1px solid rgba(255,255,255,0.08);

            border-radius: 22px;

            padding: 20px;

            margin-bottom: 30px;

        }

        .security-label {

            color: #fbbf24;

            font-size: 13px;
            font-weight: 600;

            letter-spacing: 1px;

            text-transform: uppercase;

            margin-bottom: 8px;

        }

        .security-value {

            color: white;

            font-size: 16px;
            font-weight: 500;

            word-break: break-word;

        }

        .form-label {

            color: #e2e8f0;

            font-weight: 500;

            margin-bottom: 10px;

        }

        .form-control {

            background: rgba(255,255,255,0.06) !important;

            border: 1px solid rgba(255,255,255,0.08) !important;

            color: white !important;

            border-radius: 16px;

            padding: 15px 18px;

            font-size: 15px;

            transition: 0.3s ease;

        }

        .form-control::placeholder {

            color: #94a3b8;

        }

        .form-control:focus {

            background: rgba(255,255,255,0.08) !important;

            border-color: #f59e0b !important;

            box-shadow:
                0 0 0 4px rgba(245,158,11,0.15);

        }

        .btn-reset {

            width: 100%;

            border: none;

            padding: 15px;

            border-radius: 16px;

            font-size: 16px;
            font-weight: 600;

            color: white;

            margin-top: 12px;

            background: linear-gradient(
                135deg,
                #f59e0b,
                #8b5cf6
            );

            box-shadow:
                0 15px 30px rgba(245,158,11,0.30);

            transition: 0.3s ease;

        }

        .btn-reset:hover {

            transform: translateY(-3px);

        }

        .footer-note {

            margin-top: 28px;

            background: rgba(255,255,255,0.05);

            border: 1px solid rgba(255,255,255,0.08);

            border-radius: 18px;

            padding: 16px 18px;

            color: #cbd5e1;

            font-size: 14px;

            display: flex;
            align-items: center;
            gap: 12px;

        }

        .footer-note span {

            font-size: 18px;

        }

        @media(max-width:576px) {

            .recover-card {

                padding: 28px 22px;

                border-radius: 24px;

            }

            .main-title {

                font-size: 1.8rem;

            }

        }

        /* FIX AUTOFILL WHITE BACKGROUND ISSUE*/
input:-webkit-autofill,
input:-webkit-autofill:hover,
input:-webkit-autofill:focus,
input:-webkit-autofill:active {
    -webkit-box-shadow: 0 0 0px 1000px #111827 inset !important;
    -webkit-text-fill-color: white !important;
    caret-color: white;
    transition: background-color 9999s ease-in-out 0s;
}

    </style>

</head>

<body>

<div class="recover-card">

    <div class="content">

        <!-- ICON -->

        <div class="icon-box">

            🔐

        </div>

        <!-- TITLE -->

        <h1 class="main-title">

            Security Recovery

        </h1>

        <p class="subtitle">

            Verify your identity using your saved security question

        </p>

        <!-- USERNAME -->

        <div class="security-box">

            <div class="security-label">

                Username

            </div>

            <div class="security-value">

                {{ user.username }}

            </div>

        </div>

        <!-- SECURITY QUESTION -->

        <div class="security-box">

            <div class="security-label">

                Security Question

            </div>

            <div class="security-value">

                {{ user.security_question }}

            </div>

        </div>

        <!-- FORM -->

        <form
            action="/recover_by_security/{{ user.id }}"
            method="POST"
        >

            <label class="form-label">

                Enter Security Answer

            </label>

            <input
                type="text"
                name="security_answer"
                class="form-control"
                placeholder="Type your security answer"
                required
            >

            <button
                type="submit"
                class="btn-reset"
            >

                Reset Password

            </button>

        </form>

        <!-- NOTE -->

        <div class="footer-note">

            <span>

                🛡️

            </span>

            <div>

                Your account recovery process is protected with advanced verification security.

            </div>

        </div>

    </div>

</div>

</body>

</html>
