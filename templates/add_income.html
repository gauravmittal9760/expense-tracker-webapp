<!DOCTYPE html>
<html>

<head>

    <title>
        Add Income
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    >

    <style>

        body {

            background:
                radial-gradient(circle at top left, #1f2937 0%, #111827 40%, #0b1120 100%);

            min-height: 100vh;

            color: white;

            overflow-x: hidden;

        }

        .income-wrapper {

            min-height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;

            padding: 40px 15px;

        }

        .income-card {

            width: 100%;

            max-width: 550px;

            background: rgba(30, 41, 59, 0.92);

            border: 1px solid rgba(255,255,255,0.08);

            border-radius: 28px;

            backdrop-filter: blur(18px);

            box-shadow:
                0 0 30px rgba(0,0,0,0.4),
                0 0 60px rgba(34,197,94,0.08);

            overflow: hidden;

            position: relative;

        }

        .income-card::before {

            content: "";

            position: absolute;

            width: 250px;

            height: 250px;

            background: rgba(34,197,94,0.12);

            border-radius: 50%;

            top: -120px;

            right: -100px;

        }

        .income-card::after {

            content: "";

            position: absolute;

            width: 180px;

            height: 180px;

            background: rgba(59,130,246,0.12);

            border-radius: 50%;

            bottom: -90px;

            left: -70px;

        }

        .card-content {

            position: relative;

            z-index: 2;

            padding: 45px;

        }

        .income-title {

            text-align: center;

            font-size: 38px;

            font-weight: 800;

            margin-bottom: 12px;

            background: linear-gradient(
                90deg,
                #22c55e,
                #4ade80,
                #86efac
            );

            -webkit-background-clip: text;

            -webkit-text-fill-color: transparent;

        }

        .income-subtitle {

            text-align: center;

            color: #cbd5e1;

            margin-bottom: 40px;

            font-size: 15px;

            letter-spacing: 0.5px;

        }

        .input-label {

            font-size: 15px;

            font-weight: 600;

            margin-bottom: 12px;

            color: #f8fafc;

        }

        .input-group-custom {

            position: relative;

        }

        .input-group-custom i {

            position: absolute;

            top: 50%;

            left: 18px;

            transform: translateY(-50%);

            color: #4ade80;

            font-size: 18px;

            z-index: 5;

        }

        .form-control {

            background: rgba(15,23,42,0.95) !important;

            border: 1px solid rgba(255,255,255,0.08) !important;

            border-radius: 16px !important;

            color: white !important;

            height: 58px;

            padding-left: 52px !important;

            font-size: 16px;

            transition: 0.3s ease;

        }

        .form-control:focus {

            box-shadow:
                0 0 0 0.2rem rgba(34,197,94,0.2);

            border-color: #22c55e !important;

            background: rgba(15,23,42,1) !important;

        }

        .form-control::placeholder {

            color: #94a3b8;

        }

        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {

            -webkit-appearance: none;

            margin: 0;

        }

        .save-btn {

            width: 100%;

            border: none;

            height: 56px;

            border-radius: 16px;

            font-size: 17px;

            font-weight: 700;

            background: linear-gradient(
                135deg,
                #16a34a,
                #22c55e
            );

            color: white;

            transition: 0.3s ease;

            margin-top: 30px;

        }

        .save-btn:hover {

            transform: translateY(-2px);

            box-shadow:
                0 10px 25px rgba(34,197,94,0.35);

        }

        .back-btn {

            width: 100%;

            height: 52px;

            border-radius: 14px;

            margin-top: 18px;

            font-weight: 600;

            font-size: 16px;

            border: 1px solid rgba(255,255,255,0.15);

            transition: 0.3s ease;

        }

        .back-btn:hover {

            transform: translateY(-2px);

        }

        .top-badge {

            display: inline-flex;

            align-items: center;

            gap: 10px;

            padding: 10px 18px;

            border-radius: 50px;

            background: rgba(34,197,94,0.12);

            border: 1px solid rgba(34,197,94,0.2);

            color: #86efac;

            font-size: 14px;

            margin-bottom: 25px;

        }

        @media(max-width: 576px) {

            .card-content {

                padding: 30px 22px;

            }

            .income-title {

                font-size: 30px;

            }

        }

        /* FIX AUTOFILL WHITE BACKGROUND ISSUE */
input:-webkit-autofill,
input:-webkit-autofill:hover,
input:-webkit-autofill:focus,
input:-webkit-autofill:active {
    -webkit-box-shadow: 0 0 0px 1000px #111827 inset !important;
    -webkit-text-fill-color: white !important;
    caret-color: white;
    transition: background-color 9999s ease-in-out 0s;
}

    </style>

</head>

<body>

<div class="income-wrapper">

    <div class="income-card">

        <div class="card-content">

            <div class="text-center">

                <div class="top-badge">

                    <i class="fa-solid fa-wallet"></i>

                    Manage Your Income Smartly

                </div>

            </div>

            <h1 class="income-title">

                Add Income 💵

            </h1>

            <p class="income-subtitle">

                Keep your financial records updated and organized.

            </p>

            <form method="POST">

                <div class="mb-3">

                    <label class="input-label">

                        Enter Income Amount

                    </label>

                    <div class="input-group-custom">

                        <i class="fa-solid fa-indian-rupee-sign"></i>

                        <input
                            type="number"
                            name="income"
                            class="form-control"
                            placeholder="Enter your current income"
                            required
                        >

                    </div>

                </div>

                <button
                    type="submit"
                    class="save-btn"
                >

                    <i class="fa-solid fa-floppy-disk me-2"></i>

                    Save Income

                </button>

            </form>

            <a
                href="/money_budget"
                class="btn btn-outline-light back-btn"
            >

                <i class="fa-solid fa-arrow-left me-2"></i>

                Back

            </a>

        </div>

    </div>

</div>

</body>

</html>
