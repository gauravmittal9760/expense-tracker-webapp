<!DOCTYPE html>
<html>

<head>

    <title>
        Expense Charts 💸
    </title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    >

    <style>

        * {

            margin: 0;
            padding: 0;
            box-sizing: border-box;

        }

        body {

            min-height: 100vh;

            background:
                radial-gradient(circle at top left, rgba(13,110,253,0.22), transparent 28%),
                radial-gradient(circle at bottom right, rgba(220,53,69,0.18), transparent 30%),
                #0f1115;

            color: white;

            overflow-x: hidden;

            font-family: "Segoe UI", sans-serif;

        }

        .glow {

            position: fixed;

            width: 320px;
            height: 320px;

            border-radius: 50%;

            filter: blur(90px);

            z-index: 0;

        }

        .glow-1 {

            top: -100px;
            left: -100px;

            background: rgba(13,110,253,0.22);

        }

        .glow-2 {

            bottom: -120px;
            right: -120px;

            background: rgba(220,53,69,0.16);

        }

        .main-wrapper {

            position: relative;

            z-index: 2;

            padding-top: 45px;
            padding-bottom: 45px;

        }

        .charts-card {

            background: rgba(31,35,40,0.90);

            backdrop-filter: blur(18px);

            border-radius: 32px;

            border: 1px solid rgba(255,255,255,0.08);

            overflow: hidden;

            box-shadow:
                0 0 40px rgba(0,0,0,0.45),
                0 0 120px rgba(13,110,253,0.08);

        }

        .top-section {

            padding: 42px 30px;

            text-align: center;

            background:
                linear-gradient(
                    135deg,
                    #0d6efd,
                    #6610f2
                );

            position: relative;

        }

        .top-section::after {

            content: "";

            position: absolute;

            inset: 0;

            background:
                linear-gradient(
                    120deg,
                    rgba(255,255,255,0.16),
                    transparent
                );

        }

        .chart-icon {

            width: 95px;
            height: 95px;

            margin: auto auto 18px;

            border-radius: 50%;

            display: flex;
            align-items: center;
            justify-content: center;

            background: rgba(255,255,255,0.18);

            border: 2px solid rgba(255,255,255,0.25);

            backdrop-filter: blur(12px);

            font-size: 42px;

            color: white;

            box-shadow: 0 0 25px rgba(255,255,255,0.14);

        }

        .top-section h1 {

            font-size: 36px;

            font-weight: 800;

            margin-bottom: 10px;

            color: white;

        }

        .top-section p {

            margin: 0;

            color: rgba(255,255,255,0.92);

            font-size: 15px;

        }

        .content-area {

            padding: 35px;

        }

        .stats-row {

            display: grid;

            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));

            gap: 18px;

            margin-bottom: 35px;

        }

        .stats-box {

            background: rgba(255,255,255,0.05);

            border: 1px solid rgba(255,255,255,0.08);

            border-radius: 22px;

            padding: 24px;

            transition: 0.3s;

        }

        .stats-box:hover {

            transform: translateY(-3px);

            background: rgba(255,255,255,0.08);

        }

        .stats-box h6 {

            color: #bcbcbc;

            margin-bottom: 10px;

            font-size: 14px;

            letter-spacing: 0.5px;

        }

        .stats-box h3 {

            margin: 0;

            font-size: 28px;

            font-weight: 800;

        }

        .stats-box i {

            font-size: 24px;

            margin-bottom: 14px;

            display: inline-block;

        }

        .chart-container {

            background: rgba(255,255,255,0.04);

            border: 1px solid rgba(255,255,255,0.07);

            border-radius: 28px;

            padding: 28px;

            margin-bottom: 30px;

            transition: 0.3s;

        }

        .chart-container:hover {

            background: rgba(255,255,255,0.06);

            transform: translateY(-2px);

        }

        .chart-title {

            display: flex;

            align-items: center;

            gap: 12px;

            font-size: 24px;

            font-weight: 700;

            margin-bottom: 25px;

        }

        .chart-title i {

            color: #0d6efd;

            font-size: 28px;

        }

        canvas {

            max-height: 420px;

        }

        .btn-back {

            width: 100%;

            border: none;

            border-radius: 18px;

            padding: 15px;

            font-size: 17px;

            font-weight: 700;

            text-decoration: none;

            display: inline-flex;

            align-items: center;
            justify-content: center;

            gap: 10px;

            background:
                linear-gradient(
                    135deg,
                    #dc3545,
                    #ff5b6e
                );

            color: white;

            transition: 0.35s;

            box-shadow:
                0 12px 30px rgba(220,53,69,0.22);

        }

        .btn-back:hover {

            transform: translateY(-2px);

            color: white;

            box-shadow:
                0 16px 40px rgba(220,53,69,0.35);

        }

        @media(max-width:768px) {

            .content-area {

                padding: 22px;

            }

            .top-section h1 {

                font-size: 29px;

            }

            .chart-title {

                font-size: 20px;

            }

        }

    </style>

</head>

<body>

<div class="glow glow-1"></div>

<div class="glow glow-2"></div>

<div class="container main-wrapper">

    <div class="charts-card">

        <!-- TOP SECTION -->

        <div class="top-section">

            <div class="chart-icon">

                <i class="bi bi-bar-chart-line-fill"></i>

            </div>

            <h1>
                Expense Charts
            </h1>

            <p>
                Visualize your spending patterns and category insights
            </p>

        </div>

        <!-- CONTENT -->

        <div class="content-area">

            <!-- STATS -->

            <div class="stats-row">

                <div class="stats-box">

                    <i class="bi bi-tags-fill text-primary"></i>

                    <h6>
                        Categories
                    </h6>

                    <h3>
                        {{ categories | length }}
                    </h3>

                </div>

                <div class="stats-box">

                    <i class="bi bi-cash-stack text-success"></i>

                    <h6>
                        Total Expense
                    </h6>

                    <h3>
                        ₹{{ amounts | sum }}
                    </h3>

                </div>

                <div class="stats-box">

                    <i class="bi bi-pie-chart-fill text-danger"></i>

                    <h6>
                        Charts Generated
                    </h6>

                    <h3>
                        2
                    </h3>

                </div>

            </div>

            <!-- PIE CHART -->

            <div class="chart-container">

                <div class="chart-title">

                    <i class="bi bi-pie-chart-fill"></i>

                    Category Distribution

                </div>

                <canvas id="pieChart"></canvas>

            </div>

            <!-- BAR CHART -->

            <div class="chart-container">

                <div class="chart-title">

                    <i class="bi bi-bar-chart-fill"></i>

                    Expense Comparison

                </div>

                <canvas id="barChart"></canvas>

            </div>

            <!-- BACK BUTTON -->

            <a
                href="/analytics_menu"
                class="btn-back"
            >

                <i class="bi bi-arrow-left-circle-fill"></i>

                Back To Analytics

            </a>

        </div>

    </div>

</div>

<script>

const categories = {{ categories | tojson }};

const amounts = {{ amounts | tojson }};

new Chart(

    document.getElementById(
        "pieChart"
    ),

    {

        type: "pie",

        data: {

            labels: categories,

            datasets: [{

                data: amounts,

                backgroundColor: [

                    "#0d6efd",
                    "#6610f2",
                    "#20c997",
                    "#ffc107",
                    "#dc3545",
                    "#fd7e14",
                    "#6f42c1",
                    "#198754"

                ],

                borderWidth: 2,

                borderColor: "#1f2328"

            }]

        },

        options: {

            plugins: {

                legend: {

                    labels: {

                        color: "white",

                        font: {

                            size: 13

                        }

                    }

                }

            }

        }

    }

);

new Chart(

    document.getElementById(
        "barChart"
    ),

    {

        type: "bar",

        data: {

            labels: categories,

            datasets: [{

                label: "Expenses",

                data: amounts,

                borderWidth: 1,

                borderRadius: 12,

                backgroundColor: [

                    "#0d6efd",
                    "#6610f2",
                    "#20c997",
                    "#ffc107",
                    "#dc3545",
                    "#fd7e14",
                    "#6f42c1",
                    "#198754"

                ]

            }]

        },

        options: {

            responsive: true,

            plugins: {

                legend: {

                    labels: {

                        color: "white"

                    }

                }

            },

            scales: {

                x: {

                    ticks: {

                        color: "white"

                    },

                    grid: {

                        color: "rgba(255,255,255,0.06)"

                    }

                },

                y: {

                    beginAtZero: true,

                    ticks: {

                        color: "white"

                    },

                    grid: {

                        color: "rgba(255,255,255,0.06)"

                    }

                }

            }

        }

    }

);

</script>

</body>

</html>
