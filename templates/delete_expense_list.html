<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Delete Expense
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    >

    <style>

        body {

            background:
                radial-gradient(circle at top right, #2d0b0b 0%, transparent 30%),
                radial-gradient(circle at bottom left, #101d35 0%, transparent 30%),
                linear-gradient(135deg, #0b0f19, #121826, #1a1111);

            min-height: 100vh;

            color: white;

            overflow-x: hidden;

        }

        .page-title {

            font-size: 42px;

            font-weight: 800;

            text-align: center;

            margin-bottom: 35px;

            background: linear-gradient(
                to right,
                #ff6b6b,
                #ffd166,
                #ffffff
            );

            -webkit-background-clip: text;

            -webkit-text-fill-color: transparent;

            letter-spacing: 1px;

        }

        .glass-card {

            background: rgba(255, 255, 255, 0.08);

            backdrop-filter: blur(18px);

            border: 1px solid rgba(255, 255, 255, 0.12);

            border-radius: 28px;

            padding: 35px;

            box-shadow:
                0 10px 40px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255,255,255,0.05);

        }

        .table-wrapper {

            border-radius: 22px;

            overflow: hidden;

            border: 1px solid rgba(255,255,255,0.08);

        }

        .table {

            margin-bottom: 0;

        }

        .table thead {

            background: rgba(255,255,255,0.08);

        }

        .table thead th {

            border: none !important;

            color: #ffffff;

            font-size: 15px;

            letter-spacing: 0.5px;

            padding: 18px;

        }

        .table tbody tr {

            transition: 0.3s ease;

        }

        .table tbody tr:hover {

            background: rgba(255,255,255,0.06);

            transform: scale(1.003);

        }

        .table tbody td {

            padding: 18px;

            vertical-align: middle;

            border-color: rgba(255,255,255,0.08);

            color: #e9ecf1;

        }

        .expense-category {

            font-weight: 700;

            color: #ffffff;

        }

        .expense-amount {

            color: #ff6b6b;

            font-weight: 700;

        }

        .expense-date {

            color: #c9d4ff;

        }

        .delete-btn {

            border: none;

            border-radius: 12px;

            padding: 10px 18px;

            font-weight: 700;

            background: linear-gradient(
                135deg,
                #ff4d4d,
                #b30000
            );

            color: white;

            transition: 0.3s ease;

            box-shadow: 0 8px 20px rgba(255, 0, 0, 0.25);

        }

        .delete-btn:hover {

            transform: translateY(-2px) scale(1.03);

            box-shadow: 0 12px 28px rgba(255, 0, 0, 0.4);

        }

        .back-btn {

            margin-top: 30px;

            border-radius: 14px;

            padding: 12px 22px;

            font-weight: 700;

            background: linear-gradient(
                135deg,
                #232b38,
                #111827
            );

            border: 1px solid rgba(255,255,255,0.08);

            color: white;

            transition: 0.3s ease;

        }

        .back-btn:hover {

            transform: translateY(-2px);

            background: linear-gradient(
                135deg,
                #2e3747,
                #1a2230
            );

            color: white;

        }

        .empty-box {

            background: rgba(255,255,255,0.05);

            border-radius: 18px;

            padding: 45px;

            text-align: center;

            border: 1px dashed rgba(255,255,255,0.15);

        }

        .empty-box i {

            font-size: 60px;

            margin-bottom: 18px;

            color: #ff7676;

        }

        .empty-box h4 {

            font-weight: 700;

        }

        @media(max-width:768px) {

            .page-title {

                font-size: 32px;

            }

            .glass-card {

                padding: 20px;

            }

            .table thead th,
            .table tbody td {

                font-size: 13px;

                padding: 14px;

            }

        }

        /* FIX AUTOFILL WHITE BACKGROUND ISSUE */
input:-webkit-autofill,
input:-webkit-autofill:hover,
input:-webkit-autofill:focus,
input:-webkit-autofill:active {
    -webkit-box-shadow: 0 0 0px 1000px #111827 inset !important;
    -webkit-text-fill-color: white !important;
    caret-color: white;
    transition: background-color 9999s ease-in-out 0s;
}

    </style>

</head>

<body>

<div class="container py-5">

    <div class="glass-card">

        <h1 class="page-title">

            <i class="fa-solid fa-trash-can"></i>

            Delete Expenses

        </h1>

        {% if expenses %}

        <div class="table-wrapper">

            <table class="table table-dark align-middle">

                <thead>

                    <tr>

                        <th>
                            Category
                        </th>

                        <th>
                            Amount
                        </th>

                        <th>
                            Date
                        </th>

                        <th class="text-center">
                            Action
                        </th>

                    </tr>

                </thead>

                <tbody>

                    {% for expense in expenses %}

                    <tr>

                        <td class="expense-category">

                            {{ expense.category }}

                        </td>

                        <td class="expense-amount">

                            ₹{{ expense.amount }}

                        </td>

                        <td class="expense-date">

                            {{ expense.date }}

                        </td>

                        <td class="text-center">

                            <button
                                onclick="deleteExpense({{ expense.id }})"
                                class="delete-btn"
                            >

                                <i class="fa-solid fa-trash"></i>

                                Delete

                            </button>

                        </td>

                    </tr>

                    {% endfor %}

                </tbody>

            </table>

        </div>

        {% else %}

        <div class="empty-box">

            <i class="fa-solid fa-folder-open"></i>

            <h4>
                No Expenses Found
            </h4>

            <p class="text-light mt-2 mb-0">
                There are currently no expenses available to delete.
            </p>

        </div>

        {% endif %}

        <a
            href="/expense_management"
            class="btn back-btn w-100"
        >

            <i class="fa-solid fa-arrow-left"></i>

            Back

        </a>

    </div>

</div>

<!-- SweetAlert -->

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>

function deleteExpense(id) {

    Swal.fire({

        title: "Delete Expense?",

        text: "This expense will be permanently deleted.",

        icon: "warning",

        showCancelButton: true,

        background: "#151c28",

        color: "#ffffff",

        confirmButtonColor: "#d33",

        cancelButtonColor: "#3085d6",

        confirmButtonText: "Yes, Delete"

    }).then((result) => {

        if (result.isConfirmed) {

            window.location.href =
                "/delete_expense/" + id;

        }

    });

}

</script>

</body>

</html>
