<!DOCTYPE html>
<html>

<head>

    <title>
        Edit Goal
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    >

    <style>

        * {

            margin: 0;
            padding: 0;
            box-sizing: border-box;

        }

        body {

            min-height: 100vh;

            background:
                radial-gradient(circle at top left, rgba(25,135,84,0.22), transparent 30%),
                radial-gradient(circle at bottom right, rgba(13,202,240,0.14), transparent 25%),
                #0f1115;

            color: white;

            overflow-x: hidden;

            font-family: "Segoe UI", sans-serif;

        }

        .glow {

            position: fixed;

            width: 320px;
            height: 320px;

            border-radius: 50%;

            filter: blur(90px);

            z-index: 0;

        }

        .glow-1 {

            top: -100px;
            left: -100px;

            background: rgba(25,135,84,0.20);

        }

        .glow-2 {

            bottom: -120px;
            right: -120px;

            background: rgba(13,202,240,0.12);

        }

        .page-wrapper {

            position: relative;

            z-index: 2;

            padding-top: 55px;
            padding-bottom: 55px;

        }

        .goal-card {

            background: rgba(31,35,40,0.88);

            backdrop-filter: blur(16px);

            border-radius: 30px;

            border: 1px solid rgba(255,255,255,0.08);

            overflow: hidden;

            box-shadow:
                0 0 35px rgba(0,0,0,0.45),
                0 0 90px rgba(25,135,84,0.08);

            transition: 0.35s;

        }

        .goal-card:hover {

            transform: translateY(-3px);

            box-shadow:
                0 0 45px rgba(0,0,0,0.50),
                0 0 110px rgba(25,135,84,0.12);

        }

        .top-section {

            background:
                linear-gradient(
                    135deg,
                    #198754,
                    #20c997
                );

            padding: 42px 30px;

            text-align: center;

            position: relative;

        }

        .top-section::after {

            content: "";

            position: absolute;

            inset: 0;

            background:
                linear-gradient(
                    120deg,
                    rgba(255,255,255,0.18),
                    transparent
                );

        }

        .goal-icon {

            width: 95px;
            height: 95px;

            margin: auto auto 18px;

            border-radius: 50%;

            display: flex;
            align-items: center;
            justify-content: center;

            background: rgba(255,255,255,0.20);

            border: 2px solid rgba(255,255,255,0.25);

            font-size: 42px;

            color: white;

            box-shadow: 0 0 25px rgba(255,255,255,0.16);

            backdrop-filter: blur(12px);

        }

        .top-section h1 {

            font-size: 34px;

            font-weight: 800;

            margin-bottom: 8px;

            color: white;

        }

        .top-section p {

            margin: 0;

            color: rgba(255,255,255,0.92);

            font-size: 15px;

        }

        .form-area {

            padding: 40px;

        }

        .field-label {

            color: #20c997;

            font-size: 14px;

            font-weight: 700;

            margin-bottom: 10px;

            display: block;

            letter-spacing: 0.5px;

        }

        .input-box {

            position: relative;

            margin-bottom: 28px;

        }

        .input-icon {

            position: absolute;

            top: 50%;
            left: 16px;

            transform: translateY(-50%);

            color: #20c997;

            font-size: 17px;

            z-index: 5;

        }

        .custom-input {

            width: 100%;

            background: rgba(255,255,255,0.05) !important;

            border: 1px solid rgba(255,255,255,0.08) !important;

            color: white !important;

            border-radius: 16px;

            padding:
                15px
                18px
                15px
                48px !important;

            font-size: 15px;

            transition: 0.3s;

        }

        .custom-input:focus {

            background: rgba(255,255,255,0.08) !important;

            border-color: #20c997 !important;

            box-shadow:
                0 0 0 4px rgba(32,201,151,0.10);

        }

        .custom-input::placeholder {

            color: #bdbdbd;

        }

        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {

            -webkit-appearance: none;

            margin: 0;

        }

        .goal-stats {

            display: grid;

            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));

            gap: 18px;

            margin-bottom: 30px;

        }

        .stats-box {

            background: rgba(255,255,255,0.05);

            border: 1px solid rgba(255,255,255,0.08);

            border-radius: 18px;

            padding: 20px;

            text-align: center;

            transition: 0.3s;

        }

        .stats-box:hover {

            transform: translateY(-2px);

            background: rgba(255,255,255,0.08);

        }

        .stats-box h5 {

            color: #20c997;

            font-size: 14px;

            margin-bottom: 10px;

            letter-spacing: 0.5px;

        }

        .stats-box h3 {

            margin: 0;

            font-size: 24px;

            font-weight: 800;

        }

        .btn-update {

            width: 100%;

            border: none;

            border-radius: 18px;

            padding: 15px;

            font-size: 17px;

            font-weight: 700;

            background:
                linear-gradient(
                    135deg,
                    #198754,
                    #20c997
                );

            color: white;

            transition: 0.35s;

            box-shadow:
                0 10px 25px rgba(25,135,84,0.18);

        }

        .btn-update:hover {

            transform: translateY(-2px);

            box-shadow:
                0 15px 35px rgba(25,135,84,0.30);

        }

        .bottom-text {

            text-align: center;

            margin-top: 20px;

            color: #bdbdbd;

            font-size: 13px;

        }

        @media(max-width:768px) {

            .form-area {

                padding: 28px 20px;

            }

            .top-section h1 {

                font-size: 28px;

            }

        }

        /* FIX AUTOFILL WHITE BACKGROUND ISSUE */
input:-webkit-autofill,
input:-webkit-autofill:hover,
input:-webkit-autofill:focus,
input:-webkit-autofill:active {
    -webkit-box-shadow: 0 0 0px 1000px #111827 inset !important;
    -webkit-text-fill-color: white !important;
    caret-color: white;
    transition: background-color 9999s ease-in-out 0s;
}

    </style>

</head>

<body>

<div class="glow glow-1"></div>

<div class="glow glow-2"></div>

<div class="container page-wrapper">

    <div class="row justify-content-center">

        <div class="col-lg-7">

            <div class="goal-card">

                <!-- TOP SECTION -->

                <div class="top-section">

                    <div class="goal-icon">

                        <i class="bi bi-bullseye"></i>

                    </div>

                    <h1>
                        Edit Goal
                    </h1>

                    <p>
                        Update your savings target and track your progress
                    </p>

                </div>

                <!-- FORM SECTION -->

                <div class="form-area">

                    <!-- QUICK STATS -->

                    <div class="goal-stats">

                        <div class="stats-box">

                            <h5>
                                Current Goal
                            </h5>

                            <h3>
                                ₹{{ goal.goal_amount }}
                            </h3>

                        </div>

                        <div class="stats-box">

                            <h5>
                                Saved Amount
                            </h5>

                            <h3>
                                ₹{{ goal.saved_amount }}
                            </h3>

                        </div>

                    </div>

                    <form method="POST">

                        <!-- GOAL NAME -->

                        <label class="field-label">

                            Goal Name

                        </label>

                        <div class="input-box">

                            <i class="bi bi-pencil-square input-icon"></i>

                            <input
                                type="text"
                                name="goal_name"
                                class="form-control custom-input"
                                value="{{ goal.goal_name }}"
                                placeholder="Enter Goal Name"
                                required
                            >

                        </div>

                        <!-- GOAL AMOUNT -->

                        <label class="field-label">

                            Goal Amount

                        </label>

                        <div class="input-box">

                            <i class="bi bi-cash-stack input-icon"></i>

                            <input
                                type="number"
                                step="0.01"
                                name="goal_amount"
                                class="form-control custom-input"
                                value="{{ goal.goal_amount }}"
                                placeholder="Enter Goal Amount"
                                required
                            >

                        </div>

                        <!-- SAVED AMOUNT -->

                        <label class="field-label">

                            Saved Amount

                        </label>

                        <div class="input-box">

                            <i class="bi bi-wallet2 input-icon"></i>

                            <input
                                type="number"
                                step="0.01"
                                name="saved_amount"
                                class="form-control custom-input"
                                value="{{ goal.saved_amount }}"
                                placeholder="Enter Saved Amount"
                            >

                        </div>

                        <!-- BUTTON -->

                        <button
                            type="submit"
                            class="btn-update"
                        >

                            <i class="bi bi-check-circle-fill"></i>

                            Update Goal

                        </button>

                    </form>

                    <div class="bottom-text">

                        Your goal progress updates instantly after saving changes.

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
