<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"

>

<title>

Admin Verification

</title>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
>

<style>

*{

    margin:0;

    padding:0;

    box-sizing:border-box;
}

body{

    min-height:100vh;

    overflow:hidden;

    display:flex;

    justify-content:center;

    align-items:center;

    font-family:
    "Segoe UI",
    sans-serif;

    background:
    radial-gradient(
        circle at top left,
        #111827,
        #020617 55%,
        #000
    );

    position:relative;
}

/* =========================
   Animated Cyber Grid
========================= */

.cyber-grid{

    position:absolute;

    inset:0;

    background-image:
    linear-gradient(
        rgba(255,255,255,0.05) 1px,
        transparent 1px
    ),
    linear-gradient(
        90deg,
        rgba(255,255,255,0.05) 1px,
        transparent 1px
    );

    background-size:50px 50px;

    animation:
    gridMove 14s linear infinite;

    z-index:0;
}

@keyframes gridMove{

    from{

        transform:
        translateY(0px);
    }

    to{

        transform:
        translateY(50px);
    }
}

/* =========================
   Neon Blobs
========================= */

.blob{

    position:absolute;

    border-radius:50%;

    filter:blur(90px);

    opacity:0.38;

    animation:
    blobFloat 10s ease-in-out infinite;
}

.blob1{

    width:320px;

    height:320px;

    background:#00e5ff;

    top:-120px;

    left:-100px;
}

.blob2{

    width:260px;

    height:260px;

    background:#00ff95;

    bottom:-100px;

    right:-70px;

    animation-delay:2s;
}

.blob3{

    width:220px;

    height:220px;

    background:#8b5cf6;

    top:40%;

    left:65%;

    animation-delay:4s;
}

@keyframes blobFloat{

    0%{

        transform:
        translateY(0px)
        scale(1);
    }

    50%{

        transform:
        translateY(-28px)
        scale(1.08);
    }

    100%{

        transform:
        translateY(0px)
        scale(1);
    }
}

/* =========================
   Floating Particles
========================= */

.particle{

    position:absolute;

    width:5px;

    height:5px;

    border-radius:50%;

    background:white;

    opacity:0.35;

    animation:
    particles linear infinite;
}

.p1{

    left:12%;

    animation-duration:13s;
}

.p2{

    left:27%;

    animation-duration:17s;
}

.p3{

    left:45%;

    animation-duration:15s;
}

.p4{

    left:70%;

    animation-duration:18s;
}

.p5{

    left:88%;

    animation-duration:12s;
}

@keyframes particles{

    from{

        transform:
        translateY(110vh)
        scale(0);
    }

    to{

        transform:
        translateY(-10vh)
        scale(1.5);
    }
}

/* =========================
   Main Card
========================= */

.box{

    width:470px;

    position:relative;

    z-index:2;

    padding:48px;

    border-radius:34px;

    background:
    rgba(15,23,42,0.82);

    border:
    1px solid rgba(255,255,255,0.08);

    backdrop-filter:blur(24px);

    box-shadow:
    0 0 60px rgba(0,255,255,0.14);

    overflow:hidden;

    animation:
    floatCard 5s ease-in-out infinite;
}

.box::before{

    content:"";

    position:absolute;

    width:260px;

    height:260px;

    background:
    radial-gradient(
        circle,
        rgba(0,255,255,0.22),
        transparent 70%
    );

    top:-110px;

    right:-80px;
}

.box::after{

    content:"";

    position:absolute;

    width:180px;

    height:180px;

    background:
    radial-gradient(
        circle,
        rgba(0,255,149,0.18),
        transparent 70%
    );

    bottom:-70px;

    left:-60px;
}

@keyframes floatCard{

    0%{

        transform:
        translateY(0px);
    }

    50%{

        transform:
        translateY(-8px);
    }

    100%{

        transform:
        translateY(0px);
    }
}

/* =========================
   Logo
========================= */

.logo{

    width:100px;

    height:100px;

    margin:auto;

    margin-bottom:26px;

    border-radius:30px;

    background:
    linear-gradient(
        135deg,
        #00e5ff,
        #00ff95
    );

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:44px;

    color:#02131f;

    box-shadow:
    0 0 35px rgba(0,255,255,0.4);

    animation:
    pulseLogo 3s infinite;
}

@keyframes pulseLogo{

    0%{

        transform:scale(1);
    }

    50%{

        transform:scale(1.08);
    }

    100%{

        transform:scale(1);
    }
}

/* =========================
   Title
========================= */

.title{

    text-align:center;

    font-size:50px;

    font-weight:900;

    margin-bottom:12px;

    background:
    linear-gradient(
        90deg,
        #00f7ff,
        #00ff95,
        #ffffff
    );

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;
}

.subtitle{

    text-align:center;

    color:#c8d3df;

    font-size:15px;

    margin-bottom:36px;

    line-height:1.7;
}

/* =========================
   Input
========================= */

.input-box{

    display:flex;

    align-items:center;

    height:66px;

    border-radius:22px;

    overflow:hidden;

    background:
    rgba(255,255,255,0.05);

    border:
    1px solid rgba(255,255,255,0.08);

    transition:0.35s;

    position:relative;
}

.input-box::before{

    content:"";

    position:absolute;

    left:-100%;

    top:0;

    width:100%;

    height:100%;

    background:
    linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,0.08),
        transparent
    );

    transition:0.7s;
}

.input-box:hover::before{

    left:100%;
}

.input-box:focus-within{

    border-color:#00e5ff;

    box-shadow:
    0 0 22px rgba(0,229,255,0.18);

    transform:
    translateY(-2px);
}

.icon{

    width:70px;

    text-align:center;

    font-size:20px;

    color:#00f7ff;
}

input{

    width:100%;

    height:100%;

    border:none;

    outline:none;

    background:transparent;

    color:white;

    font-size:17px;

    padding-right:20px;
}

input::placeholder{

    color:#98a7bb;
}

/* =========================
   Button
========================= */

button{

    width:100%;

    height:66px;

    margin-top:30px;

    border:none;

    border-radius:24px;

    font-size:20px;

    font-weight:900;

    cursor:pointer;

    color:#02131f;

    background:
    linear-gradient(
        135deg,
        #00e5ff,
        #00ff95
    );

    transition:0.35s;

    position:relative;

    overflow:hidden;
}

button::before{

    content:"";

    position:absolute;

    inset:0;

    background:
    linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,0.45),
        transparent
    );

    transform:
    translateX(-100%);
}

button:hover::before{

    animation:
    shine 1s linear;
}

@keyframes shine{

    to{

        transform:
        translateX(100%);
    }
}

button:hover{

    transform:
    translateY(-4px)
    scale(1.01);

    box-shadow:
    0 0 30px rgba(0,255,149,0.3);
}

/* =========================
   Bottom Line
========================= */

.bottom-line{

    width:110px;

    height:4px;

    margin:auto;

    margin-top:28px;

    border-radius:20px;

    background:
    linear-gradient(
        90deg,
        #00e5ff,
        #00ff95
    );

    box-shadow:
    0 0 15px rgba(0,255,255,0.6);
}

/* =========================
   Responsive
========================= */

@media(max-width:600px){

    .box{

        width:92%;

        padding:35px 24px;
    }

    .title{

        font-size:40px;
    }
}

</style>

</head>

<body>

<div class="cyber-grid"></div>

<div class="blob blob1"></div>

<div class="blob blob2"></div>

<div class="blob blob3"></div>

<div class="particle p1"></div>
<div class="particle p2"></div>
<div class="particle p3"></div>
<div class="particle p4"></div>
<div class="particle p5"></div>

<div class="box">

<div class="logo">

    <i class="fa-solid fa-user-shield"></i>

</div>

<div class="title">

    Verify Admin

</div>

<div class="subtitle">

    Advanced Secure Admin Gateway ⚡
    <br>
    Verify your identity to access the supreme dashboard

</div>

<form method="POST">

<div class="input-box">

    <div class="icon">

        <i class="fa-solid fa-lock"></i>

    </div>

    <input

        type="password"

        name="admin_password"

        placeholder="Enter Admin Password"

        required

    >

</div>

<button type="submit">

    Enter Admin Panel

</button>

</form>

<div class="bottom-line"></div>

</div>

</body>

</html>
