<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Delete Any User
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    >

    <style>

        body{

            background:
                radial-gradient(circle at top left,
                #1b1f35,
                #090b12 45%,
                #020305 100%);

            min-height:100vh;

            color:white;

            overflow-x:hidden;
        }

        .glow{

            position:fixed;

            width:450px;

            height:450px;

            border-radius:50%;

            filter:blur(100px);

            z-index:-1;
        }

        .g1{

            background:
                rgba(255,0,85,0.10);

            top:-140px;

            left:-140px;
        }

        .g2{

            background:
                rgba(255,152,0,0.10);

            bottom:-160px;

            right:-140px;
        }

        .main-container{

            padding:40px 20px;
        }

        .top-title{

            text-align:center;

            margin-bottom:40px;
        }

        .top-title h1{

            font-size:54px;

            font-weight:900;

            background:
                linear-gradient(
                    90deg,
                    #ff1744,
                    #ff9800,
                    #ffd600
                );

            -webkit-background-clip:text;

            -webkit-text-fill-color:transparent;
        }

        .top-title p{

            color:#b7bfd8;

            margin-top:10px;

            font-size:18px;
        }

        .glass-card{

            background:
                rgba(255,255,255,0.05);

            border:
                1px solid rgba(255,255,255,0.08);

            backdrop-filter:blur(18px);

            border-radius:35px;

            padding:30px;

            box-shadow:
                0 0 45px rgba(0,0,0,0.4);
        }

        .table{

            margin:0;

            border-collapse:separate;

            border-spacing:0 14px;
        }

        .table thead th{

            border:none;

            color:#ff9800;

            text-transform:uppercase;

            letter-spacing:1px;

            font-size:14px;
        }

        .table tbody tr{

            background:
                rgba(255,255,255,0.04);

            transition:0.3s;

            border-radius:18px;
        }

        .table tbody tr:hover{

            transform:translateY(-4px);

            background:
                rgba(255,23,68,0.08);

            box-shadow:
                0 0 25px rgba(255,23,68,0.12);
        }

        .table td{

            border:none;

            padding:20px 14px;

            vertical-align:middle;

            color:#f1f1f1;
        }

        .user-badge{

            background:
                rgba(255,152,0,0.14);

            color:#ff9800;

            padding:10px 18px;

            border-radius:50px;

            font-weight:800;
        }

        .delete-btn{

            border:none;

            border-radius:14px;

            padding:12px 18px;

            font-weight:800;

            color:white;

            background:
                linear-gradient(
                    135deg,
                    #ff1744,
                    #d50000
                );

            transition:0.3s;
        }

        .delete-btn:hover{

            transform:scale(1.06);

            box-shadow:
                0 0 25px rgba(255,23,68,0.3);
        }

        .back-btn{

            margin-top:28px;

            width:100%;

            border:none;

            border-radius:18px;

            padding:15px;

            font-size:18px;

            font-weight:800;

            background:
                linear-gradient(
                    135deg,
                    #00e5ff,
                    #2962ff
                );

            color:white;

            transition:0.3s;
        }

        .back-btn:hover{

            transform:translateY(-3px);

            box-shadow:
                0 0 22px rgba(0,229,255,0.25);
        }

        @media(max-width:768px){

            .top-title h1{

                font-size:40px;
            }

            .table td{

                font-size:14px;
            }

        }

    </style>

</head>

<body>

<div class="glow g1"></div>

<div class="glow g2"></div>

<div class="container-fluid main-container">

    <div class="top-title">

        <h1>

            🗑 Delete User Accounts

        </h1>

        <p>

            Permanently remove any registered user from the system.

        </p>

    </div>

    <div class="glass-card">

        <div class="table-responsive">

            <table class="table text-center align-middle">

                <thead>

                    <tr>

                        <th>
                            ID
                        </th>

                        <th>
                            Username
                        </th>

                        <th>
                            Email
                        </th>

                        <th>
                            Action
                        </th>

                    </tr>

                </thead>

                <tbody>

                    {% for user in users %}

                    <tr>

                        <td>

                            #{{ user.id }}

                        </td>

                        <td>

                            <span class="user-badge">

                                {{ user.username }}

                            </span>

                        </td>

                        <td>

                            {{ user.email }}

                        </td>

                        <td>

                            <a
                                href="/delete_user/{{ user.id }}"
                                class="btn delete-btn"
                                onclick="return confirm('Delete this user permanently?')"
                            >

                                <i class="fa-solid fa-trash"></i>

                                Delete

                            </a>

                        </td>

                    </tr>

                    {% endfor %}

                </tbody>

            </table>

        </div>

        <a
            href="/admin_user_management"
            class="btn back-btn"
        >

            <i class="fa-solid fa-arrow-left"></i>

            Back To User Management

        </a>

    </div>

</div>

</body>

</html>
