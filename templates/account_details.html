<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>

Account Login Records

</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet"
>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    min-height:100vh;

    overflow-x:hidden;

    color:white;

    font-family:
    "Segoe UI",
    sans-serif;

    background:
    radial-gradient(circle at top left,#10213f 0%,#050816 40%,#000000 100%);

    position:relative;
}

.bg-grid{

    position:fixed;

    inset:0;

    background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);

    background-size:40px 40px;

    z-index:-3;
}

.container-box{

    padding:45px 20px;
}

.title{

    text-align:center;

    margin-bottom:40px;
}

.title h1{

    font-size:52px;

    font-weight:900;

    background:
    linear-gradient(
        90deg,
        #00e5ff,
        #00ff95
    );

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;
}

.subtitle{

    margin-top:15px;

    color:#c7d7ef;
}

.users-box{

    background:
    rgba(255,255,255,0.06);

    border:
    1px solid rgba(255,255,255,0.08);

    border-radius:30px;

    padding:30px;

    backdrop-filter:blur(20px);
}

.user-card{

    display:flex;

    justify-content:space-between;

    align-items:center;

    gap:20px;

    flex-wrap:wrap;

    padding:24px;

    margin-bottom:20px;

    border-radius:22px;

    background:
    linear-gradient(
        145deg,
        rgba(255,255,255,0.05),
        rgba(255,255,255,0.03)
    );

    border:
    1px solid rgba(255,255,255,0.06);

    transition:0.3s;
}

.user-card:hover{

    transform:
    translateY(-4px);

    box-shadow:
    0 0 25px rgba(0,255,231,0.12);
}

.user-info{

    flex:1;
}

.user-name{

    font-size:28px;

    font-weight:900;

    color:#00ffe0;
}

.user-email{

    margin-top:8px;

    color:#c7d7ef;
}

.view-btn{

    border:none;

    padding:14px 24px;

    border-radius:18px;

    font-weight:900;

    background:
    linear-gradient(
        135deg,
        #00e5ff,
        #00ff95
    );

    color:black;

    text-decoration:none;
}

.view-btn:hover{

    opacity:0.9;
}

.empty-box{

    text-align:center;

    padding:60px 20px;
}

.empty-box i{

    font-size:70px;

    margin-bottom:20px;

    color:#00e5ff;
}

</style>

</head>

<body>

<div class="bg-grid"></div>

<div class="container container-box">

<div class="title">

<h1>

🔐 Account Login Records

</h1>

<div class="subtitle">

Monitor login activity of all users

</div>

</div>

<div class="users-box">

{% if users %}

{% for user in users %}

<div class="user-card">

<div class="user-info">

<div class="user-name">

{{ user.username }}

</div>

<div class="user-email">

{{ user.email }}

</div>

</div>

<a
href="/user_login_records/{{ user.id }}"
class="view-btn"
>

View Records

</a>

</div>

{% endfor %}

{% else %}

<div class="empty-box">

<i class="fa-solid fa-database"></i>

<h2>

No Users Found

</h2>

</div>

{% endif %}

</div>

</div>

</body>

</html>
