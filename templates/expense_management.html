<!DOCTYPE html>
<html>

<head>

    <title>
        Expense Management
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    >

    <style>

        * {

            margin: 0;
            padding: 0;
            box-sizing: border-box;

        }

        body {

            min-height: 100vh;

            background:
                radial-gradient(circle at top left, rgba(13,110,253,0.18), transparent 28%),
                radial-gradient(circle at bottom right, rgba(220,53,69,0.14), transparent 30%),
                #0f1115;

            color: white;

            overflow-x: hidden;

            font-family: "Segoe UI", sans-serif;

        }

        .glow {

            position: fixed;

            width: 320px;
            height: 320px;

            border-radius: 50%;

            filter: blur(90px);

            z-index: 0;

        }

        .glow-1 {

            top: -100px;
            left: -100px;

            background: rgba(13,110,253,0.20);

        }

        .glow-2 {

            bottom: -120px;
            right: -120px;

            background: rgba(220,53,69,0.16);

        }

        .main-wrapper {

            position: relative;

            z-index: 2;

            min-height: 100vh;

            display: flex;

            align-items: center;
            justify-content: center;

            padding: 30px;

        }

        .management-card {

            width: 100%;

            max-width: 760px;

            background: rgba(31,35,40,0.88);

            backdrop-filter: blur(18px);

            border-radius: 34px;

            border: 1px solid rgba(255,255,255,0.08);

            overflow: hidden;

            box-shadow:
                0 0 40px rgba(0,0,0,0.40),
                0 0 120px rgba(13,110,253,0.08);

        }

        .top-section {

            padding: 42px 35px;

            text-align: center;

            background:
                linear-gradient(
                    135deg,
                    #0d6efd,
                    #6610f2
                );

            position: relative;

            overflow: hidden;

        }

        .top-section::after {

            content: "";

            position: absolute;

            inset: 0;

            background:
                linear-gradient(
                    120deg,
                    rgba(255,255,255,0.18),
                    transparent
                );

        }

        .manage-icon {

            width: 100px;
            height: 100px;

            margin: auto auto 18px;

            border-radius: 50%;

            display: flex;

            align-items: center;
            justify-content: center;

            background: rgba(255,255,255,0.18);

            border: 2px solid rgba(255,255,255,0.22);

            backdrop-filter: blur(10px);

            box-shadow:
                0 0 28px rgba(255,255,255,0.14);

            font-size: 42px;

            color: white;

        }

        .top-section h1 {

            font-size: 38px;

            font-weight: 800;

            margin-bottom: 10px;

            color: white;

        }

        .top-section p {

            color: rgba(255,255,255,0.92);

            margin: 0;

            font-size: 15px;

        }

        .content-area {

            padding: 35px;

        }

        .action-card {

            display: flex;

            align-items: center;
            justify-content: space-between;

            gap: 20px;

            padding: 24px;

            margin-bottom: 22px;

            border-radius: 24px;

            background:
                linear-gradient(
                    135deg,
                    rgba(255,255,255,0.05),
                    rgba(255,255,255,0.03)
                );

            border: 1px solid rgba(255,255,255,0.07);

            transition: 0.35s;

            text-decoration: none;

            color: white;

        }

        .action-card:hover {

            transform: translateY(-4px);

            background:
                linear-gradient(
                    135deg,
                    rgba(255,255,255,0.08),
                    rgba(255,255,255,0.04)
                );

            box-shadow:
                0 0 25px rgba(13,110,253,0.10);

            color: white;

        }

        .left-section {

            display: flex;

            align-items: center;

            gap: 18px;

        }

        .action-icon {

            width: 72px;
            height: 72px;

            border-radius: 22px;

            display: flex;

            align-items: center;
            justify-content: center;

            font-size: 30px;

            color: white;

            flex-shrink: 0;

        }

        .add-icon {

            background:
                linear-gradient(
                    135deg,
                    #198754,
                    #20c997
                );

            box-shadow:
                0 10px 25px rgba(25,135,84,0.24);

        }

        .edit-icon {

            background:
                linear-gradient(
                    135deg,
                    #ffc107,
                    #ff9800
                );

            box-shadow:
                0 10px 25px rgba(255,193,7,0.22);

        }

        .delete-icon {

            background:
                linear-gradient(
                    135deg,
                    #dc3545,
                    #ff5d73
                );

            box-shadow:
                0 10px 25px rgba(220,53,69,0.24);

        }

        .action-title {

            font-size: 24px;

            font-weight: 700;

            margin-bottom: 5px;

        }

        .action-subtitle {

            color: #c7c7c7;

            font-size: 14px;

        }

        .arrow-icon {

            font-size: 28px;

            color: rgba(255,255,255,0.75);

            transition: 0.3s;

        }

        .action-card:hover .arrow-icon {

            transform: translateX(5px);

            color: white;

        }

        .btn-back {

            margin-top: 10px;

            width: 100%;

            border: none;

            border-radius: 20px;

            padding: 15px;

            text-decoration: none;

            display: inline-flex;

            align-items: center;
            justify-content: center;

            gap: 10px;

            font-size: 17px;

            font-weight: 700;

            background:
                linear-gradient(
                    135deg,
                    #dc3545,
                    #ff5d73
                );

            color: white;

            transition: 0.35s;

            box-shadow:
                0 12px 28px rgba(220,53,69,0.22);

        }

        .btn-back:hover {

            transform: translateY(-2px);

            color: white;

            box-shadow:
                0 16px 40px rgba(220,53,69,0.35);

        }

        @media(max-width:768px) {

            .content-area {

                padding: 22px;

            }

            .top-section h1 {

                font-size: 30px;

            }

            .action-card {

                flex-direction: column;

                align-items: flex-start;

            }

            .arrow-icon {

                display: none;

            }

            .action-title {

                font-size: 21px;

            }

        }

        /* FIX AUTOFILL WHITE BACKGROUND ISSUE */
input:-webkit-autofill,
input:-webkit-autofill:hover,
input:-webkit-autofill:focus,
input:-webkit-autofill:active {
    -webkit-box-shadow: 0 0 0px 1000px #111827 inset !important;
    -webkit-text-fill-color: white !important;
    caret-color: white;
    transition: background-color 9999s ease-in-out 0s;
}

    </style>

</head>

<body>

<div class="glow glow-1"></div>

<div class="glow glow-2"></div>

<div class="main-wrapper">

    <div class="management-card">

        <!-- TOP SECTION -->

        <div class="top-section">

            <div class="manage-icon">

                <i class="bi bi-gear-wide-connected"></i>

            </div>

            <h1>
                Expense Management
            </h1>

            <p>
                Manage your expenses with smart editing and tracking tools
            </p>

        </div>

        <!-- CONTENT -->

        <div class="content-area">

            <!-- ADD EXPENSE -->

            <a
                href="/add_expense"
                class="action-card"
            >

                <div class="left-section">

                    <div class="action-icon add-icon">

                        <i class="bi bi-plus-circle-fill"></i>

                    </div>

                    <div>

                        <div class="action-title">

                            Add Expense

                        </div>

                        <div class="action-subtitle">

                            Record a new expense with details and images

                        </div>

                    </div>

                </div>

                <i class="bi bi-arrow-right-circle-fill arrow-icon"></i>

            </a>

            <!-- EDIT EXPENSE -->

            <a
                href="/edit_expense_list"
                class="action-card"
            >

                <div class="left-section">

                    <div class="action-icon edit-icon">

                        <i class="bi bi-pencil-square"></i>

                    </div>

                    <div>

                        <div class="action-title">

                            Edit Expense

                        </div>

                        <div class="action-subtitle">

                            Modify categories, amounts, descriptions and images

                        </div>

                    </div>

                </div>

                <i class="bi bi-arrow-right-circle-fill arrow-icon"></i>

            </a>

            <!-- DELETE EXPENSE -->

            <a
                href="/delete_expense_list"
                class="action-card"
            >

                <div class="left-section">

                    <div class="action-icon delete-icon">

                        <i class="bi bi-trash3-fill"></i>

                    </div>

                    <div>

                        <div class="action-title">

                            Delete Expense

                        </div>

                        <div class="action-subtitle">

                            Remove unnecessary expense entries permanently

                        </div>

                    </div>

                </div>

                <i class="bi bi-arrow-right-circle-fill arrow-icon"></i>

            </a>

            <!-- BACK -->

            <a
                href="/dashboard"
                class="btn-back"
            >

                <i class="bi bi-arrow-left-circle-fill"></i>

                Back To Dashboard

            </a>

        </div>

    </div>

</div>

</body>

</html>
