<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Verify OTP
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    >

    <style>

        *{

            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            min-height:100vh;

            background:
                radial-gradient(circle at top left,#22c55e22 0%,transparent 30%),
                radial-gradient(circle at bottom right,#0ea5e922 0%,transparent 30%),
                linear-gradient(135deg,#0f172a,#111827,#1e293b);

            overflow:hidden;

            font-family:'Segoe UI',sans-serif;

            color:white;

            position:relative;
        }

        body::before{

            content:"";

            position:absolute;

            width:420px;
            height:420px;

            background:rgba(34,197,94,0.08);

            border-radius:50%;

            top:-170px;
            left:-120px;

            filter:blur(60px);
        }

        body::after{

            content:"";

            position:absolute;

            width:360px;
            height:360px;

            background:rgba(14,165,233,0.08);

            border-radius:50%;

            bottom:-150px;
            right:-100px;

            filter:blur(60px);
        }

        .main-wrapper{

            position:relative;
            z-index:2;

            min-height:100vh;

            display:flex;
            align-items:center;
            justify-content:center;

            padding:20px;
        }

        .otp-card{

            width:100%;
            max-width:520px;

            background:rgba(17,24,39,0.78);

            backdrop-filter:blur(20px);

            border:1px solid rgba(255,255,255,0.08);

            border-radius:32px;

            padding:45px 35px;

            box-shadow:
                0 15px 50px rgba(0,0,0,0.55),
                inset 0 1px 0 rgba(255,255,255,0.05);

            animation:fadeUp 0.7s ease;
        }

        @keyframes fadeUp{

            from{

                opacity:0;
                transform:translateY(40px);
            }

            to{

                opacity:1;
                transform:translateY(0);
            }
        }

        .otp-icon{

            width:110px;
            height:110px;

            margin:auto;

            border-radius:30px;

            display:flex;
            align-items:center;
            justify-content:center;

            background:
                linear-gradient(135deg,#22c55e,#0ea5e9);

            font-size:3rem;

            box-shadow:
                0 0 35px rgba(34,197,94,0.4);

            margin-bottom:30px;

            animation:floatIcon 3s ease-in-out infinite;
        }

        @keyframes floatIcon{

            0%{

                transform:translateY(0px);
            }

            50%{

                transform:translateY(-8px);
            }

            100%{

                transform:translateY(0px);
            }
        }

        .main-title{

            text-align:center;

            font-size:2.6rem;
            font-weight:800;

            margin-bottom:10px;

            background:
                linear-gradient(90deg,#ffffff,#bbf7d0,#bae6fd);

            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
        }

        .subtitle{

            text-align:center;

            color:#cbd5e1;

            margin-bottom:35px;

            font-size:1rem;
        }

        .otp-box{

            position:relative;

            margin-bottom:28px;
        }

        .otp-box i{

            position:absolute;

            left:18px;
            top:50%;

            transform:translateY(-50%);

            color:#86efac;

            font-size:1.1rem;
        }

        .form-control{

            height:65px;

            background:rgba(255,255,255,0.05) !important;

            border:1px solid rgba(255,255,255,0.08) !important;

            border-radius:18px;

            color:white !important;

            padding-left:55px;

            font-size:1.1rem;

            box-shadow:none !important;

            transition:0.3s ease;
        }

        .form-control:focus{

            border-color:#22c55e !important;

            background:rgba(255,255,255,0.08) !important;

            box-shadow:
                0 0 18px rgba(34,197,94,0.18) !important;
        }

        .form-control::placeholder{

            color:#94a3b8;
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button{

            -webkit-appearance:none;
            margin:0;
        }

        input[type=number]{

            -moz-appearance:textfield;
        }

        .verify-btn{

            width:100%;

            height:62px;

            border:none;

            border-radius:18px;

            font-size:1.05rem;
            font-weight:700;

            color:white;

            background:
                linear-gradient(135deg,#22c55e,#0ea5e9);

            transition:0.35s ease;

            box-shadow:
                0 10px 25px rgba(34,197,94,0.35);
        }

        .verify-btn:hover{

            transform:translateY(-3px);

            box-shadow:
                0 14px 35px rgba(34,197,94,0.45);
        }

        .bottom-note{

            margin-top:28px;

            text-align:center;

            color:#94a3b8;

            font-size:0.92rem;
        }

        .bottom-note i{

            color:#22c55e;

            margin-right:6px;
        }

        @media(max-width:768px){

            .otp-card{

                padding:35px 22px;
            }

            .main-title{

                font-size:2rem;
            }

            .otp-icon{

                width:90px;
                height:90px;

                font-size:2.3rem;
            }

            .form-control{

                height:58px;
            }

            .verify-btn{

                height:58px;
            }
        }

         /* FIX AUTOFILL WHITE BACKGROUND ISSUE */
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus,
    input:-webkit-autofill:active {
        -webkit-box-shadow: 0 0 0px 1000px #111827 inset !important;
        -webkit-text-fill-color: white !important;
        caret-color: white;
        transition: background-color 9999s ease-in-out 0s;
    }

    </style>

</head>

<body>

<div class="main-wrapper">

    <div class="otp-card">

        <!-- ICON -->

        <div class="otp-icon">

            <i class="fa-solid fa-shield-halved"></i>

        </div>

        <!-- TITLE -->

        <h1 class="main-title">

            Verify OTP

        </h1>

        <p class="subtitle">

            Enter the login verification OTP sent to your registered email.
        </p>

        <!-- FORM -->

        <form method="POST">

            <div class="otp-box">

                <i class="fa-solid fa-key"></i>

                <input
                    type="number"
                    name="otp"
                    class="form-control"
                    placeholder="Enter OTP"
                    required
                >

            </div>

            <button
                class="verify-btn"
            >

                <i class="fa-solid fa-circle-check me-2"></i>

                Verify OTP

            </button>

        </form>

        <!-- FOOTER NOTE -->

        <div class="bottom-note">

            <i class="fa-solid fa-lock"></i>

            Your account verification is fully secure.

        </div>

    </div>

</div>

</body>

</html>
