<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Edit Expense
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    >

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {

            background:
                radial-gradient(circle at top left, rgba(255,193,7,0.18), transparent 30%),
                radial-gradient(circle at bottom right, rgba(255,255,255,0.06), transparent 25%),
                #0f1115;

            min-height: 100vh;
            color: white;
            overflow-x: hidden;
            font-family: "Segoe UI", sans-serif;
        }

        .floating-light {

            position: fixed;
            width: 320px;
            height: 320px;
            border-radius: 50%;
            background: rgba(255,193,7,0.08);
            filter: blur(90px);
            z-index: 0;
        }

        .light-1 {
            top: -100px;
            left: -100px;
        }

        .light-2 {

            bottom: -120px;
            right: -120px;

            background: rgba(255,255,255,0.05);
        }

        .edit-wrapper {

            position: relative;
            z-index: 2;
            padding-top: 55px;
            padding-bottom: 55px;
        }

        .edit-card {

            background: rgba(31, 35, 40, 0.88);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 30px;
            overflow: hidden;

            box-shadow:
                0 0 35px rgba(0,0,0,0.45),
                0 0 80px rgba(255,193,7,0.06);

            transition: 0.4s;
        }

        .top-banner {

            background:
                linear-gradient(
                    135deg,
                    #ffc107,
                    #ff9800
                );

            padding: 38px 25px;
            text-align: center;
            position: relative;
        }

        .banner-icon {

            width: 90px;
            height: 90px;

            margin: auto auto 18px;

            border-radius: 50%;

            display: flex;
            align-items: center;
            justify-content: center;

            font-size: 42px;

            background: rgba(255,255,255,0.22);

            border: 2px solid rgba(255,255,255,0.30);

            color: white;
        }

        .top-banner h1 {

            font-size: 34px;
            font-weight: 800;
            margin-bottom: 8px;
            color: white;
        }

        .top-banner p {

            margin: 0;
            color: rgba(255,255,255,0.90);
            font-size: 15px;
        }

        .form-section {
            padding: 40px;
        }

        .input-label {

            font-size: 14px;
            font-weight: 600;
            color: #ffc107;
            margin-bottom: 10px;
            display: block;
        }

        .input-group-custom {

            position: relative;
            margin-bottom: 28px;
        }

        .input-icon {

            position: absolute;
            top: 50%;
            left: 16px;
            transform: translateY(-50%);
            color: #ffc107;
            font-size: 17px;
            z-index: 5;
        }

        .custom-input {

            width: 100%;
            background: rgba(255,255,255,0.05) !important;
            border: 1px solid rgba(255,255,255,0.08) !important;
            color: white !important;
            border-radius: 16px;

            padding:
                15px
                18px
                15px
                48px !important;

            font-size: 15px;
        }

        textarea.custom-input {

            min-height: 130px;
            resize: none;
            padding-top: 16px !important;
        }

        .preview-box {

            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 22px;
            padding: 22px;
            margin-bottom: 28px;
        }

        .expense-images {

            width: 100%;
            height: 170px;
            object-fit: cover;
            border-radius: 18px;
            border: 2px solid rgba(255,255,255,0.08);
        }

        .btn-update {

            width: 100%;
            border: none;
            border-radius: 18px;
            padding: 15px;
            font-size: 17px;
            font-weight: 700;

            background:
                linear-gradient(
                    135deg,
                    #ffc107,
                    #ff9800
                );

            color: #111;
        }

        .remove-box {

            background: rgba(255,255,255,0.04);
            padding: 10px;
            border-radius: 15px;
        }

        .form-check-input {

            background-color: #222;
            border: 1px solid #555;
        }

        .form-check-input:checked {

            background-color: #dc3545;
            border-color: #dc3545;
        }

        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus,
        input:-webkit-autofill:active {

            -webkit-box-shadow: 0 0 0px 1000px #111827 inset !important;
            -webkit-text-fill-color: white !important;
            caret-color: white;
        }

    </style>

</head>

<body>

<div class="floating-light light-1"></div>

<div class="floating-light light-2"></div>

<div class="container edit-wrapper">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="edit-card">

                <div class="top-banner">

                    <div class="banner-icon">

                        <i class="bi bi-pencil-square"></i>

                    </div>

                    <h1>
                        Edit Expense
                    </h1>

                    <p>
                        Update your expense details instantly
                    </p>

                </div>

                <div class="form-section">

                    <form
                        method="POST"
                        enctype="multipart/form-data"
                    >

                        <label class="input-label">

                            Expense Category

                        </label>

                        <div class="input-group-custom">

                            <i class="bi bi-tags-fill input-icon"></i>

                            <input
                                type="text"
                                name="category"
                                class="form-control custom-input"
                                value="{{ expense.category }}"
                                required
                            >

                        </div>

                        <label class="input-label">

                            Expense Description

                        </label>

                        <div class="input-group-custom">

                            <i class="bi bi-card-text input-icon"></i>

                            <textarea
                                name="description"
                                class="form-control custom-input"
                            >{{ expense.description or '' }}</textarea>

                        </div>

                        <label class="input-label">

                            Expense Amount

                        </label>

                        <div class="input-group-custom">

                            <i class="bi bi-currency-rupee input-icon"></i>

                            <input
                                type="number"
                                name="amount"
                                class="form-control custom-input"
                                value="{{ expense.amount }}"
                                required
                            >

                        </div>

                        <label class="input-label">

                            Expense Date

                        </label>

                        <div class="input-group-custom">

                            <i class="bi bi-calendar-event-fill input-icon"></i>

                            <input
                                type="date"
                                name="date"
                                class="form-control custom-input"
                                value="{{ expense.date }}"
                                required
                            >

                        </div>

                        <!-- CURRENT IMAGES -->

                        {% set image_list = [] %}

                        {% if expense.images %}

                            {% set image_list = expense.images | from_json %}

                        {% endif %}

                        {% if image_list %}

                        <div class="preview-box">

                            <label class="input-label mb-4">

                                Current Images

                            </label>

                            <div class="row">

                                {% for img in image_list %}

                                <div class="col-md-4 mb-4">

                                    <div class="mb-3">

                                        <img
                                            src="{{ url_for('static', filename='uploads/' + img) }}"
                                            width="220"
                                            class="rounded mb-2 expense-images"
                                        >

                                        <div class="form-check">

                                            <input
                                                class="form-check-input"
                                                type="checkbox"
                                                name="remove_images"
                                                value="{{ img }}"
                                            >

                                            <label class="form-check-label">

                                                Remove Image

                                            </label>

                                        </div>

                                    </div>

                                </div>

                                {% endfor %}

                            </div>

                        </div>

                        {% endif %}

                        <!-- MULTIPLE IMAGE UPLOAD -->

                        <label class="input-label">

                            Upload More Images

                        </label>

                        <div class="input-group-custom">

                            <input
                                type="file"
                                name="new_images"
                                class="form-control custom-input"
                                multiple
                                accept="image/*"
                            >

                        </div>

                        <button class="btn-update">

                            <i class="bi bi-check-circle-fill"></i>

                            Update Expense

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
